                                </span>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {rawFiles.length > 0 && (
                <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                  <button
                    onClick={function() { if (fileInputRef.current) fileInputRef.current.click(); }}
                    style={{
                      padding: "10px 24px", borderRadius: 8, border: "1px solid " + COLORS.orange,
                      background: "#fff", color: COLORS.orange, fontSize: 14, fontWeight: 600,
                      cursor: "pointer", display: "flex", alignItems: "center", gap: 8,
                      fontFamily: "Poppins, sans-serif",
                    }}
                  >
                    <Plus size={16} /> {"Adicionar mais"}
                  </button>
                  <button
                    onClick={processAllFiles}
                    disabled={!rawFiles.some(function(f) { return f.status === "ok"; })}
                    style={{
                      padding: "10px 32px", borderRadius: 8, border: "none",
                      background: rawFiles.some(function(f) { return f.status === "ok"; }) ? COLORS.orange : "#ccc",
                      color: "#fff", fontSize: 14, fontWeight: 600,
                      cursor: rawFiles.some(function(f) { return f.status === "ok"; }) ? "pointer" : "not-allowed",
                      display: "flex", alignItems: "center", gap: 8,
                      fontFamily: "Poppins, sans-serif",
                    }}
                  >
                    {"Montar DRE"}
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════
      // RENDER: DASHBOARD
      // ═══════════════════════════════════════════════════════
      function renderDashboard() {
        if (displayPeriods.length === 0) return <div style={{ padding: 40, textAlign: "center", color: "#999" }}>{"Selecione ao menos um período"}</div>;

        // Soma acumulada de todos os períodos selecionados
        var sumDre = { receitaBruta: 0, lucroBruto: 0, ebitda: 0, lucroLiquido: 0, cmv: 0, compras: 0, perda: 0, qtdVendas: 0, vmPayVenda: 0 };
        var hasSome = false;
        displayPeriods.forEach(function(p) {
          var d = dreByPeriod[p];
          if (!d) return;
          hasSome = true;
          sumDre.receitaBruta += d.receitaBruta || 0;
          sumDre.lucroBruto += d.lucroBruto || 0;
          sumDre.ebitda += d.ebitda || 0;
          sumDre.lucroLiquido += d.lucroLiquido || 0;
          sumDre.cmv += d.cmv || 0;
          sumDre.compras += d.compras || 0;
          sumDre.perda += d.perda || 0;
          sumDre.qtdVendas += d.qtdVendas || 0;
          sumDre.vmPayVenda += d.vmPayVenda || 0;
        });

        if (!hasSome) return <div style={{ padding: 40, textAlign: "center", color: "#999" }}>{"Sem dados"}</div>;

        var margemBruta = sumDre.receitaBruta ? sumDre.lucroBruto / sumDre.receitaBruta : 0;
        var pctLL = sumDre.receitaBruta ? sumDre.lucroLiquido / sumDre.receitaBruta : 0;
        var pctEBITDA = sumDre.receitaBruta ? sumDre.ebitda / sumDre.receitaBruta : 0;
        var margemCMV = sumDre.receitaBruta ? 1 - (sumDre.cmv / sumDre.receitaBruta) : 0;
        var pctPerda = sumDre.receitaBruta ? sumDre.perda / sumDre.receitaBruta : 0;

        var periodLabel2 = displayPeriods.length === 1
          ? (grouping === "mensal" ? periodLabel(displayPeriods[0]) : grouping === "trimestral" ? quarterLabel(displayPeriods[0]) : grouping === "semestral" ? semesterLabel(displayPeriods[0]) : String(displayPeriods[0]))
          : displayPeriods.length + " per\u00edodos";

        var ticketMedioTotal = sumDre.qtdVendas > 0 ? sumDre.vmPayVenda / sumDre.qtdVendas : 0;

        var cards = [
          { title: "Receita Bruta", value: fmtBRL(sumDre.receitaBruta), sub: periodLabel2, bg: COLORS.navy, color: "#fff" },
          { title: "Lucro L\u00edquido", value: fmtBRL(sumDre.lucroLiquido), sub: fmtPct(pctLL) + " da RB", bg: sumDre.lucroLiquido >= 0 ? COLORS.teal : COLORS.red, color: "#fff" },
          { title: "EBITDA", value: fmtBRL(sumDre.ebitda), sub: fmtPct(pctEBITDA) + " da RB", bg: sumDre.ebitda >= 0 ? COLORS.teal : COLORS.red, color: "#fff" },
          { title: "Margem Bruta", value: fmtPct(margemBruta), sub: fmtBRL(sumDre.lucroBruto), bg: COLORS.amber, color: COLORS.navy },
          { title: "Margem CMV", value: fmtPct(margemCMV), sub: "CMV: " + fmtBRL(sumDre.cmv), bg: "#fff", color: COLORS.navy, border: true },
          { title: "Perda", value: fmtBRL(sumDre.perda), sub: fmtPct(pctPerda) + " da RB", bg: Math.abs(sumDre.perda) > sumDre.receitaBruta * 0.03 ? COLORS.red : "#fff", color: Math.abs(sumDre.perda) > sumDre.receitaBruta * 0.03 ? "#fff" : COLORS.navy, border: Math.abs(sumDre.perda) <= sumDre.receitaBruta * 0.03 },
          { title: "Tickets", value: sumDre.qtdVendas.toLocaleString("pt-BR"), sub: "vendas no per\u00edodo", bg: "#fff", color: COLORS.navy, border: true },
          { title: "Ticket M\u00e9dio", value: "R$ " + ticketMedioTotal.toFixed(2).replace(".", ","), sub: sumDre.qtdVendas > 0 ? sumDre.qtdVendas.toLocaleString("pt-BR") + " vendas" : "sem dados VMPAY", bg: "#fff", color: COLORS.navy, border: true },
        ];

        var chartData = displayPeriods.map(function(p) {
          var d = dreByPeriod[p];
          return {
            name: grouping === "mensal" ? periodLabel(p) : grouping === "trimestral" ? quarterLabel(p) : grouping === "semestral" ? semesterLabel(p) : String(p),
            receitaBruta: d ? d.receitaBruta : 0,
            lucroBruto: d ? d.lucroBruto : 0,
            ebitda: d ? d.ebitda : 0,
            lucroLiquido: d ? d.lucroLiquido : 0,
            qtdVendas: d ? d.qtdVendas : 0,
            ticketMedio: d ? d.ticketMedio : 0,
          };
        });

        return (
          <div style={{ padding: "20px 24px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 32 }}>
              {cards.map(function(c, i) {
                return (
                  <div key={i} style={{ background: c.bg, color: c.color, borderRadius: 12, padding: "18px 16px 14px", boxShadow: "0 2px 8px rgba(0,0,0,0.12)", border: c.border ? "1px solid #e0e0e0" : "none" }}>
                    <div style={{ fontSize: 12, opacity: 0.8, fontWeight: 500, marginBottom: 4 }}>{String(c.title)}</div>
                    <div style={{ fontSize: 26, fontWeight: 700, lineHeight: 1.2 }}>{String(c.value)}</div>
                    <div style={{ fontSize: 12, opacity: 0.7, marginTop: 6 }}>{String(c.sub)}</div>
                  </div>
                );
              })}
            </div>

            {displayPeriods.length >= 2 && (
              <div style={{ background: "#fff", borderRadius: 12, padding: 24, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                <h3 style={{ color: COLORS.navy, fontSize: 16, fontWeight: 600, margin: "0 0 20px 0" }}>
                  {"Evolução dos Indicadores"}
                </h3>
                <ResponsiveContainer width="100%" height={340}>
                  <LineChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                    <XAxis dataKey="name" tick={{ fontSize: 11, fill: "#666" }} />
                    <YAxis tickFormatter={function(v) { return fmtBRL(v); }} tick={{ fontSize: 10, fill: "#666" }} width={100} />
                    <RechartsTooltip
                      formatter={function(value, name) {
                        var labels = { receitaBruta: "Receita Bruta", lucroBruto: "Lucro Bruto", ebitda: "EBITDA", lucroLiquido: "Lucro Líquido" };
                        return [fmtBRL(value), labels[name] || String(name)];
                      }}
                      contentStyle={{ borderRadius: 8, border: "none", boxShadow: "0 2px 8px rgba(0,0,0,0.12)", fontSize: 12 }}
                    />
                    <Legend iconType="circle" wrapperStyle={{ fontSize: 12 }} formatter={function(v) {
                      var labels = { receitaBruta: "Receita Bruta", lucroBruto: "Lucro Bruto", ebitda: "EBITDA", lucroLiquido: "Lucro Líquido" };
                      return labels[v] || String(v);
                    }} />
                    <ReferenceLine y={0} stroke="#555" strokeWidth={0.8} />
                    <Line type="monotone" dataKey="receitaBruta" stroke={COLORS.navy} strokeWidth={2.5} dot={{ r: 3 }} />
                    <Line type="monotone" dataKey="lucroBruto" stroke={COLORS.amber} strokeWidth={2} dot={{ r: 3 }} />
                    <Line type="monotone" dataKey="ebitda" stroke={COLORS.orange} strokeWidth={2} dot={{ r: 3 }} />
                    <Line type="monotone" dataKey="lucroLiquido" stroke={COLORS.teal} strokeWidth={2} dot={{ r: 3 }} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            )}

            {displayPeriods.length >= 2 && chartData.some(function(d) { return d.qtdVendas > 0; }) && (
              <div style={{ background: "#fff", borderRadius: 12, padding: 24, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginTop: 20 }}>
                <h3 style={{ color: COLORS.navy, fontSize: 16, fontWeight: 600, margin: "0 0 20px 0" }}>
                  {"Tickets e Ticket M\u00e9dio"}
                </h3>
                <ResponsiveContainer width="100%" height={280}>
                  <ComposedChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                    <XAxis dataKey="name" tick={{ fontSize: 11, fill: "#666" }} />
                    <YAxis yAxisId="left" tickFormatter={function(v) { return v.toLocaleString("pt-BR"); }} tick={{ fontSize: 10, fill: "#666" }} width={70} />
                    <YAxis yAxisId="right" orientation="right" tickFormatter={function(v) { return "R$ " + v.toFixed(0); }} tick={{ fontSize: 10, fill: "#666" }} width={70} />
                    <RechartsTooltip
                      formatter={function(value, name) {
                        if (name === "qtdVendas") return [value.toLocaleString("pt-BR"), "Tickets"];
                        if (name === "ticketMedio") return ["R$ " + value.toFixed(2).replace(".", ","), "Ticket M\u00e9dio"];
                        return [value, name];
                      }}
                      contentStyle={{ borderRadius: 8, border: "none", boxShadow: "0 2px 8px rgba(0,0,0,0.12)", fontSize: 11, padding: "6px 10px" }}
                    />
                    <Legend iconType="circle" wrapperStyle={{ fontSize: 12 }} formatter={function(v) {
                      return v === "qtdVendas" ? "Tickets" : v === "ticketMedio" ? "Ticket M\u00e9dio" : v;
                    }} />
                    <Bar yAxisId="left" dataKey="qtdVendas" name="qtdVendas" fill={COLORS.navy} radius={[4, 4, 0, 0]} opacity={0.7} />
                    <Line yAxisId="right" type="monotone" dataKey="ticketMedio" name="ticketMedio" stroke={COLORS.orange} strokeWidth={2.5} dot={{ r: 4, fill: COLORS.orange }} />
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
            )}

            {displayPeriods.length >= 2 && (
              <div style={{ background: "#fff", borderRadius: 12, padding: 24, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginTop: 20 }}>
                <h3 style={{ color: COLORS.navy, fontSize: 16, fontWeight: 600, margin: "0 0 20px 0" }}>
                  {"Comparativo por Período"}
                </h3>
                <ResponsiveContainer width="100%" height={280}>
                  <BarChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                    <XAxis dataKey="name" tick={{ fontSize: 11, fill: "#666" }} />
                    <YAxis tickFormatter={function(v) { return fmtBRL(v); }} tick={{ fontSize: 10, fill: "#666" }} width={100} />
                    <RechartsTooltip
                      formatter={function(value, name) {
                        var labels = { receitaBruta: "Receita Bruta", lucroLiquido: "Lucro Líquido", ebitda: "EBITDA" };
                        return [fmtBRL(value), labels[name] || String(name)];
                      }}
                      contentStyle={{ borderRadius: 8, border: "none", boxShadow: "0 2px 8px rgba(0,0,0,0.12)", fontSize: 12 }}
                    />
                    <ReferenceLine y={0} stroke="#555" strokeWidth={0.8} />
                    <Bar dataKey="receitaBruta" name="Receita Bruta" fill={COLORS.navy} radius={[4, 4, 0, 0]} />
                    <Bar dataKey="ebitda" name="EBITDA" fill={COLORS.orange} radius={[4, 4, 0, 0]} />
                    <Bar dataKey="lucroLiquido" name="Lucro Líquido" radius={[4, 4, 0, 0]}>
                      {chartData.map(function(entry, idx) {
                        return <Cell key={idx} fill={entry.lucroLiquido >= 0 ? COLORS.teal : COLORS.red} />;
                      })}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            )}
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════
      // RENDER: DRE TABLE
      // ═══════════════════════════════════════════════════════
      function renderDRETable() {
        if (displayPeriods.length === 0) return <div style={{ padding: 40, textAlign: "center", color: "#999" }}>{"Selecione ao menos um período"}</div>;

        return (
          <div style={{ display: "flex", gap: 0 }}>
          <div style={{ flex: 1, padding: "12px 16px", minWidth: 0 }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12, flexWrap: "wrap" }}>
              <button onClick={function() { setShowDreNotes(!showDreNotes); }}
                style={{ padding: "4px 10px", borderRadius: 5, border: "1px solid " + (showDreNotes ? COLORS.teal : "#ddd"), background: showDreNotes ? COLORS.teal + "15" : "#fff", color: showDreNotes ? COLORS.teal : "#888", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "Poppins", display: "flex", alignItems: "center", gap: 4 }}>
{"\u270e Observa\u00e7\u00f5es"}
              </button>
              <SegmentedButton
                options={[{ value: "brl", label: "R$" }, { value: "pct", label: "% RB" }, { value: "both", label: "R$ + %" }]}
                selected={valueMode}
                onChange={setValueMode}
              />
              <ToggleBtn label="Resumido" active={dreCondensed} onClick={function() { setDreCondensed(!dreCondensed); }} />
              {displayPeriods.length >= 2 ? <ToggleBtn label={"Σ Consolidado"} active={showConsolidated} onClick={function() { setShowConsolidated(!showConsolidated); }} /> : null}
              <ToggleBtn label={"Δ Variação"} active={showDelta} onClick={function() { setShowDelta(!showDelta); }} />
              <ToggleBtn label="Heatmap" active={showHeatmap} onClick={function() { setShowHeatmap(!showHeatmap); }} />
              {!dreCondensed ? <button onClick={expandAll} style={smallBtnStyle}>{"Expandir tudo"}</button> : null}
              {!dreCondensed ? <button onClick={collapseAll} style={smallBtnStyle}>{"Colapsar tudo"}</button> : null}
              <button onClick={exportDREToExcel} style={Object.assign({}, smallBtnStyle, { background: COLORS.teal, color: "#fff", borderColor: COLORS.teal, fontWeight: 600 })}>{"↓ Excel"}</button>
              <span style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#666" }}>
                {"Ajuste BO padrão:"}
                <span style={{ display: "flex", alignItems: "center", gap: 3 }}>
                  <span style={{ color: COLORS.teal, fontWeight: 600 }}>{"ATS"}</span>
                  <input
                    key={"bo_def_" + (backofficeAdj.default || 0)}
                    type="text"
                    defaultValue={(backofficeAdj.default || 0).toLocaleString("pt-BR")}
                    onBlur={function(e) {
                      var raw = e.target.value.replace(/\./g, "").replace(",", ".");
                      var num = parseFloat(raw) || 0;
                      if (num < 0) num = 0;
                      var newAdj = JSON.parse(JSON.stringify(backofficeAdj));
                      newAdj.default = num;
                      saveBackofficeAdj(newAdj);
                    }}
                    onKeyDown={function(e) { if (e.key === "Enter") e.target.blur(); }}
                    onFocus={function(e) { e.target.select(); }}
                    style={{ width: 75, textAlign: "right", border: "1px solid " + COLORS.teal + "60", borderRadius: 4, padding: "3px 6px", fontSize: 11, fontFamily: "Poppins", color: COLORS.teal }}
                  />
                </span>
                <span style={{ display: "flex", alignItems: "center", gap: 3 }}>
                  <span style={{ color: COLORS.red, fontWeight: 600 }}>{"Mini"}</span>
                  <span style={{ width: 75, textAlign: "right", border: "1px solid " + COLORS.red + "60", borderRadius: 4, padding: "3px 6px", fontSize: 11, fontFamily: "Poppins", color: COLORS.red, background: "#fafafa", display: "inline-block" }}>
                    {(-(backofficeAdj.default || 0)).toLocaleString("pt-BR")}
                  </span>
                </span>
              </span>
            </div>

            <div style={{ overflowX: "auto", borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, background: "#fff" }}>
                <thead>
                  <tr style={{ background: COLORS.navy, color: "#fff" }}>
                    <th style={{ padding: "8px 12px", textAlign: "left", position: "sticky", left: 0, background: COLORS.navy, zIndex: 11, minWidth: 260 }}>
                      {"Conta"}
                    </th>
                    {displayPeriods.map(function(p, i) {
                      var label = grouping === "mensal" ? periodLabel(p) : grouping === "trimestral" ? quarterLabel(p) : grouping === "semestral" ? semesterLabel(p) : String(p);
                      var cols = [
                        <th key={"h_" + p} style={{ padding: "8px 10px", textAlign: "right", minWidth: valueMode === "both" ? 160 : 110, whiteSpace: "nowrap" }}>
                          {label}
                        </th>
                      ];
                      if (showDelta && i > 0) {
                        cols.push(
                          <th key={"hd_" + p} style={{ padding: "4px 6px", textAlign: "center", minWidth: 56, fontSize: 10, opacity: 0.8 }}>
                            {"Δ%"}
                          </th>
                        );
                      }
                      return cols;
                    })}
                    {showConsolidated && displayPeriods.length >= 2 ? (
                      <th style={{ padding: "8px 10px", textAlign: "right", minWidth: valueMode === "both" ? 160 : 110, whiteSpace: "nowrap", background: COLORS.amber, color: COLORS.navy, fontWeight: 700 }}>
                        {"Consolidado"}
                      </th>
                    ) : null}
                  </tr>
                </thead>
                <tbody>
                  {visibleRows.map(function(row, ri) {
                    if (row.separator) {
                      return (
                        <tr key={row.key}>
                          <td colSpan={100} style={{ height: 3, background: "linear-gradient(90deg, " + COLORS.cream + ", " + COLORS.amber + ", " + COLORS.orange + ", " + COLORS.red + ")" }} />
                        </tr>
                      );
                    }

                    var isCollapsible = row.collapsible;
                    var isCollapsedRow = collapsed[row.key];
                    var values = displayPeriods.map(function(p) { return dreByPeriod[p] ? row.getValue(dreByPeriod[p]) : null; });
                    var sparkValues = row.sparkKey ? periods.map(function(p) {
                      var d = allMonthsDre[p];
                      if (!d) return null;
                      if (row.sparkKey === "receitaBruta") return d.receitaBruta;
                      if (row.sparkKey === "receitaLiquida") return d.receitaLiquida;
                      if (row.sparkKey === "cmv") return d.cmv;
                      if (row.sparkKey === "compras") return d.compras;
                      if (row.sparkKey === "perda") return d.perda;
                      if (row.sparkKey === "lucroBruto") return d.lucroBruto;
                      if (row.sparkKey === "totalOpex") return d.totalOpex;
                      if (row.sparkKey === "ebitda") return d.ebitda;
                      if (row.sparkKey === "juros") return d.juros;
                      if (row.sparkKey === "impostosParcelados") return d.impostosParcelados;
                      if (row.sparkKey === "totalImpostosLucro") return d.totalImpostosLucro;
                      if (row.sparkKey === "sociedade") return d.sociedade;
                      if (row.sparkKey === "lucroLiquido") return d.lucroLiquido;
                      if (row.sparkKey === "capex") return d.capex;
                      if (row.sparkKey === "impostosReceita") return d.impostosReceita;
                      if (row.sparkKey && row.sparkKey.startsWith("opex_")) {
                        var c = row.sparkKey.replace("opex_", "");
                        return d.opexGroups[c] ? d.opexGroups[c].total : 0;
                      }
                      return null;
                    }) : null;

                    var hasWarn = row.warn ? displayPeriods.some(function(p) { return dreByPeriod[p] && row.warn(dreByPeriod[p]); }) : false;
                    var rowBg = row.accent ? COLORS.navy + "18" : row.highlight ? COLORS.navy + "08" : (ri % 2 === 0 ? "#fff" : "#fafafa");

                    return (
                      <tr key={row.key} style={{ background: rowBg, borderTop: row.accent ? "2px solid " + COLORS.navy : undefined, borderBottom: row.accent ? "2px solid " + COLORS.navy : undefined }}>
                        <td
                          style={{
                            padding: "6px 12px 6px " + (12 + row.level * 20) + "px",
                            fontWeight: row.highlight ? 700 : row.level === 1 ? 600 : 400,
                            fontSize: row.accent ? 14 : row.highlight ? 13 : 12,
                            color: COLORS.navy,
                            position: "sticky", left: 0, background: rowBg, zIndex: 5,
                            borderRight: "1px solid #eee",
                            whiteSpace: "nowrap",
                            cursor: isCollapsible ? "pointer" : "default",
                            letterSpacing: row.accent ? "0.5px" : undefined,
                          }}
                          onClick={isCollapsible ? function() { toggleCollapse(row.key); } : undefined}
                        >
                          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                            {isCollapsible ? (isCollapsedRow ? <ChevronRight size={14} color="#999" /> : <ChevronDown size={14} color="#999" />) : null}
                            {String(row.label)}
                            {row.isNew ? (
                              <span style={{ background: COLORS.orange, color: "#fff", fontSize: 9, padding: "1px 6px", borderRadius: 4, fontWeight: 700, marginLeft: 4 }}>
                                {"NOVO"}
                              </span>
                            ) : null}
                            {row.vmTag && dreByPeriod[displayPeriods[0]] && row.vmTag(dreByPeriod[displayPeriods[0]]) ? (
                              <span style={{ background: "#6366f1", color: "#fff", fontSize: 9, padding: "1px 6px", borderRadius: 4, fontWeight: 700, marginLeft: 4 }} title={row.vmDetail && dreByPeriod[displayPeriods[0]] ? row.vmDetail(dreByPeriod[displayPeriods[0]]) || "Fonte: VMPAY" : "Fonte: VMPAY"}>
                                {"VMPAY"}
                              </span>
                            ) : null}
                            {hasWarn ? <AlertTriangle size={13} color={COLORS.amber} style={{ marginLeft: 4 }} /> : null}
                            {sparkValues ? <Sparkline values={sparkValues} inverted={row.inverted} /> : null}
                          </span>
                        </td>
                        {displayPeriods.map(function(p, i) {
                          var d = dreByPeriod[p];
                          var val = d ? row.getValue(d) : null;
                          var rb = d ? d.receitaBruta : 0;
                          var heatBg = getHeatmapBg(values, val, row.inverted);

                          var isAdjATS = row.key === "opex_01_Ajuste BO (ATS)";
                          var isAdjMini = row.key === "opex_01_Ajuste BO (Mini)";
                          var isAdjRow = isAdjATS || isAdjMini;
                          var cells = [
                            <td key={"v_" + p} style={{
                              padding: isAdjRow ? "3px 6px" : "6px 10px", textAlign: "right",
                              fontWeight: row.highlight ? 700 : 400,
                              fontSize: row.accent ? 14 : undefined,
                              background: isAdjRow ? COLORS.amber + "10" : (heatBg !== "transparent" ? heatBg : undefined),
                              borderLeft: "1px solid #f0f0f0",
                            }}>
                              {isAdjRow ? (
                                <input
                                  key={"bo_" + p + "_" + (isAdjMini ? "mini" : "ats") + "_" + (getBackofficeAdj(p) || 0)}
                                  type="text"
                                  defaultValue={(function() {
                                    var v = getBackofficeAdj(p);
                                    var display = isAdjMini ? -v : v;
                                    return display.toLocaleString("pt-BR");
                                  })()}
                                  onBlur={function(e) {
                                    var raw = e.target.value.replace(/\./g, "").replace(",", ".");
                                    var num = parseFloat(raw) || 0;
                                    var storeVal = isAdjMini ? -num : num;
                                    if (storeVal < 0) storeVal = 0;
                                    var newAdj = JSON.parse(JSON.stringify(backofficeAdj));
                                    if (!newAdj.overrides) newAdj.overrides = {};
                                    newAdj.overrides[p] = storeVal;
                                    saveBackofficeAdj(newAdj);
                                  }}
                                  onKeyDown={function(e) { if (e.key === "Enter") e.target.blur(); }}
                                  onFocus={function(e) { e.target.select(); }}
                                  style={{ width: 80, textAlign: "right", border: "1px solid " + (isAdjATS ? COLORS.teal + "60" : COLORS.red + "60"), borderRadius: 4, padding: "2px 6px", fontSize: 11, fontFamily: "Poppins", background: backofficeAdj.overrides && backofficeAdj.overrides[p] !== undefined ? "#fff" : COLORS.amber + "08", color: isAdjMini ? COLORS.red : COLORS.teal }}
                                  title={isAdjATS ? "Custo alocado AO ATS (positivo)" : "Custo retirado DO Mini (negativo)"}
                                />
                              ) : renderValue(val, rb, row.inverted)}
                            </td>
                          ];

                          if (showDelta && i > 0) {
                            var prevP = displayPeriods[i - 1];
                            var prevD = dreByPeriod[prevP];
                            var prevVal = prevD ? row.getValue(prevD) : null;
                            cells.push(
                              <td key={"d_" + p} style={{
                                padding: "4px 6px", fontSize: 11, textAlign: "center",
                                fontWeight: 500, minWidth: 56,
                                color: (function() {
                                  if (val == null || prevVal == null || prevVal === 0) return "#999";
                                  var dd = (val - prevVal) / Math.abs(prevVal);
                                  return row.inverted ? (dd > 0 ? COLORS.red : COLORS.teal) : (dd > 0 ? COLORS.teal : COLORS.red);
                                })(),
                                background: (function() {
                                  if (val == null || prevVal == null || prevVal === 0) return "transparent";
                                  var dd = (val - prevVal) / Math.abs(prevVal);
                                  var c = row.inverted ? (dd > 0 ? COLORS.red : COLORS.teal) : (dd > 0 ? COLORS.teal : COLORS.red);
                                  return c + "10";
                                })()
                              }}>
                                {val != null && prevVal != null && prevVal !== 0 ? fmtDelta((val - prevVal) / Math.abs(prevVal)) : "—"}
                              </td>
                            );
                          }

                          return cells;
                        })}
                        {showConsolidated && displayPeriods.length >= 2 ? (function() {
                          var consVal = 0;
                          var consRB = 0;
                          displayPeriods.forEach(function(p) {
                            var d = dreByPeriod[p];
                            if (d) {
                              consVal += row.getValue(d) || 0;
                              consRB += d.receitaBruta || 0;
                            }
                          });
                          return (
                            <td style={{
                              padding: "6px 10px", textAlign: "right",
                              fontWeight: row.highlight ? 700 : 600,
                              fontSize: row.accent ? 14 : undefined,
                              background: COLORS.amber + "12",
                              borderLeft: "2px solid " + COLORS.amber,
                            }}>
                              {renderValue(consVal, consRB, row.inverted)}
                            </td>
                          );
                        })() : null}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
          {/* ── NOTES SIDEBAR ── */}
          {showDreNotes ? (
            <div style={{
              width: 300, minWidth: 300, background: "#fff", borderLeft: "1px solid #eee",
              padding: "12px 14px", display: "flex", flexDirection: "column",
              boxShadow: "-2px 0 8px rgba(0,0,0,0.03)"
            }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.navy, textTransform: "uppercase", letterSpacing: "0.5px" }}>
                  {"\u270e Observa\u00e7\u00f5es"}
                </span>
                <button onClick={function() { setShowDreNotes(false); }}
                  style={{ background: "none", border: "none", cursor: "pointer", color: "#aaa", fontSize: 14, padding: 2 }}>{"\u00d7"}</button>
              </div>
              <textarea
                value={dreNotes}
                onChange={function(e) { saveDreNotes(e.target.value); }}
                placeholder={"Anote aqui suas observa\u00e7\u00f5es sobre os resultados do DRE...\n\nEx:\n- Faturamento caiu em Jan por conta de...\n- OPEX alto por causa de...\n- Margem bruta melhorou porque..."}

      function updateBudgetCell(branch, month, lineKey, value) {
        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          if (next.branches[branch] && next.branches[branch].months[month]) {
            next.branches[branch].months[month][lineKey] = value;
          }
          return next;
        });
      }

      function addBudgetBranch(name, type) {
        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          if (!next.branches[name]) {
            next.branches[name] = emptyBudgetBranch(type);
          }
          return next;
        });
        setBudgetBranch(name);
        setSelectedBudgetBranches(function(prev) {
          return prev.indexOf(name) >= 0 ? prev : prev.concat([name]);
        });
      }

      function removeBudgetBranch(name) {
        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          delete next.branches[name];
          return next;
        });
        setSelectedBudgetBranches(function(prev) { return prev.filter(function(b) { return b !== name; }); });
        setBudgetBranch(function(prev) { return prev === name ? Object.keys(budget.branches).find(function(b) { return b !== name; }) || null : prev; });
      }

      function importBaselineForBranch(branchName) {
        if (!parsedData[branchName]) return;
        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          if (!next.branches[branchName]) next.branches[branchName] = emptyBudgetBranch("operacional");
          var bd = parsedData[branchName];
          Object.keys(bd).forEach(function(period) {
            var parts = period.split("-");
            var mm = parts[1];
            if (!next.branches[branchName].months[mm]) return;
            var raw = getConsolidated(period); // uses single-branch? no — we need raw per-branch
            var d = bd[period];
            // FAT data → receita
            if (d.fat) {
              next.branches[branchName].months[mm].receita = d.fat.venda || 0;
            }
            // COM data → compras (excluindo EXTRAS = equipamentos)
            if (d.com) {
              var extrasVal = 0;
              if (d.com.categories) {
                d.com.categories.forEach(function(cat) {
                  if (/^EXTRAS$/i.test(String(cat.nome || "").trim())) extrasVal += cat.compraLiq || 0;
                });
              }
              next.branches[branchName].months[mm].compras = (d.com.totalCompraLiq || 0) - extrasVal;
            }
            // DESP data → groups
            if (d.desp) {
              Object.keys(d.desp).forEach(function(code) {
                var paddedCode = code.length === 1 ? "0" + code : code;
                var lineKey = "g_" + paddedCode;
                var total = 0;
                Object.keys(d.desp[code].items).forEach(function(item) {
                  total += d.desp[code].items[item];
                });
                next.branches[branchName].months[mm][lineKey] = total;
              });
            }
          });
          return next;
        });
      }

      function fillFromHistory(branchName) {
        if (!parsedData[branchName]) return;
        var periods = Object.keys(parsedData[branchName]).sort();
        var last3Periods = periods.slice(-3);
        if (last3Periods.length === 0) return;

        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          if (!next.branches[branchName]) next.branches[branchName] = emptyBudgetBranch("operacional");

          BUDGET_LINES.forEach(function(line) {
            var lineKey = line.key;
            var values = [];
            last3Periods.forEach(function(period) {
              var parts = period.split("-");
              var mm = parts[1];
              var d = parsedData[branchName][period];
              var val = 0;
              if (lineKey === "receita" && d.fat) {
                val = d.fat.venda || 0;
              } else if (lineKey === "compras" && d.com) {
                var extVal = 0;
                if (d.com.categories) { d.com.categories.forEach(function(cat) { if (/^EXTRAS$/i.test(String(cat.nome || "").trim())) extVal += cat.compraLiq || 0; }); }
                val = (d.com.totalCompraLiq || 0) - extVal;
              } else if (lineKey.indexOf("g_") === 0 && d.desp) {
                var code = lineKey.substring(2);
                if (code.length === 2 && code[0] === "0") {
                  code = code.substring(1);
                }
                if (d.desp[code]) {
                  var total = 0;
                  Object.keys(d.desp[code].items).forEach(function(item) {
                    total += d.desp[code].items[item];
                  });
                  val = total;
                } else if (d.desp["0" + code]) {
                  var total = 0;
                  Object.keys(d.desp["0" + code].items).forEach(function(item) {
                    total += d.desp["0" + code].items[item];
                  });
                  val = total;
                }
              }
              values.push(val);
            });

            if (values.length > 0) {
              var avg = values.reduce(function(a, b) { return a + b; }, 0) / values.length;
              for (var mi = 1; mi <= 12; mi++) {
                var mm = ("0" + mi).slice(-2);
                next.branches[branchName].months[mm][lineKey] = avg;
              }
            }
          });
          return next;
        });
      }

      // Compute rateio allocation for a given month
      function computeRateio(month) {
        var backBranch = budget.branches["BACKOFFICE"];
        if (!backBranch) return {};
        var backMonth = backBranch.months[month] || emptyBudgetMonth();
        var totalBack = 0;
        BUDGET_LINES.forEach(function(l) {
          if (l.type === "expense") totalBack += (backMonth[l.key] || 0);
        });

        var operBranches = Object.keys(budget.branches).filter(function(b) {
          return budget.branches[b].type !== "backoffice" && selectedBudgetBranches.indexOf(b) >= 0;
        });

        var alloc = {};
        if (budget.rateio.method === "fixo") {
          operBranches.forEach(function(b) {
            var pct = (budget.rateio.fixed[b] || 0) / 100;
            alloc[b] = totalBack * pct;
          });
        } else {
          // Proporcional à receita orçada
          var totalRev = 0;
          operBranches.forEach(function(b) {
            totalRev += (budget.branches[b].months[month] || {}).receita || 0;
          });
          operBranches.forEach(function(b) {
            var rev = (budget.branches[b].months[month] || {}).receita || 0;
            alloc[b] = totalRev > 0 ? totalBack * (rev / totalRev) : 0;
          });
        }
        return alloc;
      }

      // Compute budget DRE for a branch+month (with optional rateio)
      function computeBudgetDRE(branchName, month, includeRateio) {
        var bd = budget.branches[branchName];
        if (!bd) return null;
        var m = bd.months[month] || emptyBudgetMonth();
        var receita = m.receita || 0;
        var compras = m.compras || 0;

        var impostosReceita = 0, opex = 0, juros = 0, impostosParcelados = 0, impostosLucro = 0, sociedade = 0, capex = 0;
        BUDGET_LINES.forEach(function(l) {
          if (!l.section) return;
          var v = m[l.key] || 0;
          if (l.section === "impostos_receita") impostosReceita += v;
          else if (l.section === "opex") opex += v;
          else if (l.section === "juros") juros += v;
          else if (l.section === "impostos_parcelados") impostosParcelados += v;
          else if (l.section === "impostos_lucro") impostosLucro += v;
          else if (l.section === "sociedade") sociedade += v;
          else if (l.section === "capex") capex += v;
        });

        var rateioValue = 0;
        if (includeRateio && bd.type !== "backoffice") {
          var alloc = computeRateio(month);
          rateioValue = alloc[branchName] || 0;
        }

        var receitaLiquida = receita - impostosReceita;
        var lucroBruto = receitaLiquida - compras;
        var ebitda = lucroBruto - opex;
        var lucroLiquido = ebitda - juros - impostosParcelados - impostosLucro - sociedade - rateioValue;

        return {
          receita: receita, impostosReceita: impostosReceita, receitaLiquida: receitaLiquida,
          compras: compras, lucroBruto: lucroBruto, opex: opex, ebitda: ebitda,
          juros: juros, impostosParcelados: impostosParcelados, impostosLucro: impostosLucro,
          sociedade: sociedade, rateio: rateioValue, lucroLiquido: lucroLiquido, capex: capex,
        };
      }

      // Excel export/import
      function exportBudgetXLSX() {
        var workbook = XLSX.utils.book_new();
        var budgetBranches = Object.keys(budget.branches).sort();

        budgetBranches.forEach(function(branchName) {
          var bd = budget.branches[branchName];
          var aoa = [];

          var headerRow = ["Linha"];
          MONTHS_LABELS.forEach(function(m) { headerRow.push(m); });
          headerRow.push("Total");
          aoa.push(headerRow);

          var lineTotal = {};
          BUDGET_LINES.forEach(function(l) { lineTotal[l.key] = 0; });

          BUDGET_LINES.forEach(function(line) {
            var row = [line.label];
            var total = 0;
            for (var mi = 1; mi <= 12; mi++) {
              var mm = ("0" + mi).slice(-2);
              var val = (bd.months[mm] || {})[line.key] || 0;
              row.push(val);
              total += val;
            }
            row.push(total);
            aoa.push(row);
          });

          var sheet = XLSX.utils.aoa_to_sheet(aoa);
          sheet["!cols"] = [{ wch: 25 }];
          for (var i = 1; i <= 13; i++) {
            if (!sheet["!cols"]) sheet["!cols"] = [];
            sheet["!cols"].push({ wch: 12 });
          }

          XLSX.utils.book_append_sheet(workbook, sheet, branchName);
        });

        XLSX.writeFile(workbook, "orcamento_" + budget.year + ".xlsx");
      }

      function importBudgetXLSX(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = new Uint8Array(e.target.result);
            var workbook = XLSX.read(data, { type: "array" });
            var newBudget = JSON.parse(JSON.stringify(budget));

            workbook.SheetNames.forEach(function(sheetName) {
              var sheet = workbook.Sheets[sheetName];
              var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

              if (rows.length < 2) return;

              var branchName = sheetName;
              if (!newBudget.branches[branchName]) {
                newBudget.branches[branchName] = emptyBudgetBranch("operacional");
              }

              for (var ri = 1; ri < rows.length; ri++) {
                var row = rows[ri];
                if (!row || !row[0]) continue;

                var lineLabel = String(row[0]).trim();
                var matchingLine = BUDGET_LINES.find(function(l) { return l.label === lineLabel; });
                if (!matchingLine) continue;

                var lineKey = matchingLine.key;
                for (var mi = 1; mi <= 12; mi++) {
                  var mm = ("0" + mi).slice(-2);
                  var cellVal = row[mi];
                  var numVal = cellVal != null ? parseFloat(String(cellVal).replace(/[^\d.-]/g, "")) : 0;
                  numVal = isNaN(numVal) ? 0 : numVal;
                  newBudget.branches[branchName].months[mm][lineKey] = numVal;
                }
              }
            });

            setBudget(newBudget);
            alert("Orçamento importado com sucesso!");
          } catch(err) { alert("Erro ao ler arquivo: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
      }

                            var val = (bd.months[mm] || {})[line.key] || 0;
                            total += val;
                            return (
                              <td key={mm} style={cellStyle}>
                                <input
                                  style={Object.assign({}, inputStyle, val !== 0 ? { color: COLORS.navy } : { color: "#ccc" })}
                                  defaultValue={val !== 0 ? val.toFixed(0) : ""}
                                  placeholder="0"
                                  onFocus={function(e) { e.target.style.border = "1px solid " + COLORS.teal; e.target.style.background = "#f8fffe"; }}
                                  onBlur={function(e) {
                                    e.target.style.border = "1px solid transparent";
                                    e.target.style.background = "transparent";
                                    var v = parseFloat(e.target.value.replace(/\./g, "").replace(",", ".")) || 0;
                                    updateBudgetCell(budgetBranch, mm, line.key, v);
                                  }}
                                />
                              </td>
                            );
                          })}
                          <td style={{ padding: "4px 8px", textAlign: "right", fontWeight: 700, fontSize: 12, color: COLORS.navy, background: "#f9f9f9" }}>
                            {fmtBRL(total)}
                          </td>
                        </tr>
                      );

                      if (isExpanded && line.section && parsedData[budgetBranch]) {
                        var codeMatch = line.key.match(/g_(.+)/);
                        if (codeMatch) {
                          var codeStr = codeMatch[1];
                          var code = codeStr.length === 2 && codeStr[0] === "0" ? codeStr.substring(1) : codeStr;
                          var periodsToCheck = Object.keys(parsedData[budgetBranch]).sort();
                          var subItems = {};
                          periodsToCheck.forEach(function(period) {
                            var d = parsedData[budgetBranch][period];
                            if (d.desp && (d.desp[code] || d.desp["0" + code])) {
                              var despGroup = d.desp[code] || d.desp["0" + code];
                              Object.keys(despGroup.items).forEach(function(itemName) {
                                subItems[itemName] = true;
                              });
                            }
                          });
                          Object.keys(subItems).forEach(function(itemName) {
                            sectionRows.push(
                              <tr key={line.key + "_sub_" + itemName} style={{ background: "#fafafa", borderBottom: "1px solid #f5f5f5" }}>
                                <td style={{
                                  paddingLeft: 32 + 12, paddingRight: 12, paddingTop: 4, paddingBottom: 4,
                                  fontSize: 11, color: "#888", fontWeight: 400, position: "sticky", left: 0, background: "#fafafa", zIndex: 1
                                }}>
                                  {itemName}
                                </td>
                                {MONTHS_LABELS.map(function(_, mi) {
                                  var mm = ("0" + (mi + 1)).slice(-2);
                                  var parts = mm.split("");
                                  var period = budgetBranch ? (budget.year + "-" + mm) : null;
                                  var val = 0;
                                  if (period && parsedData[budgetBranch] && parsedData[budgetBranch][period]) {
                                    var d = parsedData[budgetBranch][period];
                                    if (d.desp && (d.desp[code] || d.desp["0" + code])) {
                                      var despGroup = d.desp[code] || d.desp["0" + code];
                                      val = despGroup.items[itemName] || 0;
                                    }
                                  }
                                  return (
                                    <td key={mm} style={{ padding: "4px 8px", textAlign: "right", fontSize: 11, color: "#888", background: "#fafafa", borderRight: "1px solid #eee" }}>
                                      {val !== 0 ? fmtBRL(val) : "—"}
                                    </td>
                                  );
                                })}
                                <td style={{ padding: "4px 8px", textAlign: "right", fontSize: 11, color: "#888", background: "#fafafa" }}>
                                  {" "}
                                </td>
                              </tr>
                            );
                          });
                        }
                      }
                    });
                    return sectionRows;
                  })}

                  {/* Computed summary rows */}
                  {(function() {
                    var summaryRows = [
                      { label: "Receita Líquida", fn: function(d) { return d.receitaLiquida; } },
                      { label: "Lucro Bruto", fn: function(d) { return d.lucroBruto; } },
                      { label: "EBITDA", fn: function(d) { return d.ebitda; } },
                      { label: "Lucro Líquido", fn: function(d) { return d.lucroLiquido; } },
                    ];
                    return summaryRows.map(function(sr) {
                      var total = 0;
                      return (
                        <tr key={"sum_" + sr.label} style={{ background: "#f0f7f5", borderTop: "2px solid " + COLORS.teal }}>
                          <td style={{ padding: "6px 12px", fontWeight: 700, fontSize: 12, color: COLORS.teal, position: "sticky", left: 0, background: "#f0f7f5", zIndex: 1 }}>
                            {sr.label}
                          </td>
                          {MONTHS_LABELS.map(function(_, mi) {
                            var mm = ("0" + (mi + 1)).slice(-2);
                            var d = computeBudgetDRE(budgetBranch, mm, includeBack);
                            var v = d ? sr.fn(d) : 0;
                            total += v;
                            return (
                              <td key={mm} style={{ padding: "6px 8px", textAlign: "right", fontWeight: 600, fontSize: 12, color: v < 0 ? COLORS.red : COLORS.teal }}>
                                {fmtBRL(v)}
                              </td>
                            );
                          })}
                          <td style={{ padding: "6px 8px", textAlign: "right", fontWeight: 700, fontSize: 12, color: total < 0 ? COLORS.red : COLORS.teal, background: "#e8f5f0" }}>
                            {fmtBRL(total)}
                          </td>
                        </tr>
                      );
                    });
                  })()}

                  {/* Rateio row (if applicable) */}
                  {includeBack && budget.branches[budgetBranch] && budget.branches[budgetBranch].type !== "backoffice" && (
                    <tr style={{ background: "#fff5eb", borderTop: "1px solid " + COLORS.orange }}>
                      <td style={{ padding: "6px 12px", fontWeight: 600, fontSize: 12, color: COLORS.orange, position: "sticky", left: 0, background: "#fff5eb", zIndex: 1 }}>
                        {"Rateio Backoffice"}
                      </td>
                      {MONTHS_LABELS.map(function(_, mi) {
                        var mm = ("0" + (mi + 1)).slice(-2);
                        var alloc = computeRateio(mm);
                        var v = alloc[budgetBranch] || 0;
                        return (
                          <td key={mm} style={{ padding: "6px 8px", textAlign: "right", fontSize: 12, color: COLORS.orange }}>
                            {v !== 0 ? fmtBRL(v) : "—"}
                          </td>
                        );
                      })}
                      <td style={{ padding: "6px 8px", textAlign: "right", fontWeight: 700, fontSize: 12, color: COLORS.orange, background: "#fff0e0" }}>
                        {(function() {
                          var t = 0;
                          for (var mi = 1; mi <= 12; mi++) {
                            var mm = ("0" + mi).slice(-2);
                            var alloc = computeRateio(mm);
                            t += alloc[budgetBranch] || 0;
                          }
                          return fmtBRL(t);
                        })()}
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          );
        }

        // ─── BVA SUB-VIEW ────────────────────────────────────
        function renderBVA() {
          var bvaLines = [
            { label: "Receita Bruta", budgetFn: function(d) { return d.receita; }, actualKey: "receitaBruta" },
            { label: "Receita Líquida", budgetFn: function(d) { return d.receitaLiquida; }, actualKey: "receitaLiquida" },
            { label: "Compras", budgetFn: function(d) { return d.compras; }, actualKey: "compras", inverted: true },
            { label: "Lucro Bruto", budgetFn: function(d) { return d.lucroBruto; }, actualKey: "lucroBruto" },
            { label: "OPEX", budgetFn: function(d) { return d.opex; }, actualKey: "opex", inverted: true },
            { label: "EBITDA", budgetFn: function(d) { return d.ebitda; }, actualKey: "ebitda" },
            { label: "Lucro Líquido", budgetFn: function(d) { return d.lucroLiquido; }, actualKey: "lucroLiquido" },
          ];

          // Get available months from actual data
          var actualMonths = periods.filter(function(p) { return p.startsWith(budget.year); }).sort();

          return (
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, minWidth: 900 }}>
                <thead>
                  <tr style={{ background: COLORS.navy, color: "#fff" }}>
                    <th style={{ padding: "8px 12px", textAlign: "left", minWidth: 140 }}>{"Linha"}</th>
                    {actualMonths.map(function(p) {
                      var mm = p.split("-")[1];
                      return [
                        <th key={"b_" + p} style={{ padding: "8px 6px", textAlign: "right", background: COLORS.teal, fontSize: 11 }}>{"Orç " + MONTHS_LABELS[parseInt(mm, 10) - 1]}</th>,
                        <th key={"a_" + p} style={{ padding: "8px 6px", textAlign: "right", fontSize: 11 }}>{"Real " + MONTHS_LABELS[parseInt(mm, 10) - 1]}</th>,
                        <th key={"v_" + p} style={{ padding: "8px 6px", textAlign: "right", fontSize: 11, background: "#3a3f5c" }}>{"Δ%"}</th>
                      ];
                    })}
                  </tr>
                </thead>
                <tbody>
                  {bvaLines.map(function(line) {
                    return (
                      <tr key={line.label} style={{ borderBottom: "1px solid #eee" }}>
                        <td style={{ padding: "6px 12px", fontWeight: 600, fontSize: 12 }}>{line.label}</td>
                        {actualMonths.map(function(p) {
                          var mm = p.split("-")[1];
                          var bDre = computeBudgetDRE(budgetBranch, mm, includeBack);
                          var bVal = bDre ? line.budgetFn(bDre) : 0;
                          var aDre = dreByPeriod[p];
                          var aVal = aDre ? (aDre[line.actualKey] || 0) : null;
                          var variance = (aVal !== null && bVal !== 0) ? ((aVal - bVal) / Math.abs(bVal)) * 100 : null;
                          var varColor = variance === null ? "#999" : (line.inverted ? (variance <= 0 ? COLORS.teal : COLORS.red) : (variance >= 0 ? COLORS.teal : COLORS.red));
                          return [
                            <td key={"b_" + p} style={{ padding: "6px 8px", textAlign: "right", color: COLORS.teal, background: "#f8fffe" }}>
                              {fmtBRL(bVal)}
                            </td>,
                            <td key={"a_" + p} style={{ padding: "6px 8px", textAlign: "right" }}>
                              {aVal !== null ? fmtBRL(aVal) : "—"}
                            </td>,
                            <td key={"v_" + p} style={{ padding: "6px 8px", textAlign: "right", fontWeight: 600, color: varColor, background: "#fafafa" }}>
                              {variance !== null ? (variance >= 0 ? "+" : "") + variance.toFixed(1) + "%" : "—"}
                            </td>
                          ];
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {actualMonths.length === 0 && (
                <div style={{ padding: 40, textAlign: "center", color: "#999" }}>
                  {"Carregue os dados reais (aba DRE) para comparar com o orçamento. Os meses de " + budget.year + " aparecerão aqui."}
                </div>
              )}
            </div>
          );
        }

        // ─── RATEIO CONFIG MODAL ─────────────────────────────
        function renderRateioModal() {
          if (!showRateioConfig) return null;
          var ops = Object.keys(budget.branches).filter(function(b) { return budget.branches[b].type !== "backoffice"; });
          var totalFixed = ops.reduce(function(s, b) { return s + (budget.rateio.fixed[b] || 0); }, 0);
          return (
            <div style={{
              position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999
            }} onClick={function(e) { if (e.target === e.currentTarget) setShowRateioConfig(false); }}>
              <div style={{ background: "#fff", borderRadius: 12, padding: 32, width: 420, maxWidth: "90vw" }}>
                <h3 style={{ margin: "0 0 16px", fontSize: 16, color: COLORS.navy }}>{"Configuração de Rateio"}</h3>

                <div style={{ marginBottom: 16 }}>
                  <SegmentedButton
                    options={[{ value: "proporcional", label: "Proporcional à Receita" }, { value: "fixo", label: "% Fixo" }]}
                    selected={budget.rateio.method}
                    onChange={function(v) {
                      setBudget(function(prev) {
                        var next = JSON.parse(JSON.stringify(prev));
                        next.rateio.method = v;
                        return next;
                      });
                    }}
                  />
                </div>

                {budget.rateio.method === "proporcional" && (
                  <p style={{ color: "#888", fontSize: 12, lineHeight: 1.5 }}>
                    {"O custo do backoffice será distribuído proporcionalmente à receita orçada de cada filial em cada mês."}
                  </p>
                )}

                {budget.rateio.method === "fixo" && (
                  <div>
                    {ops.map(function(b) {
                      return (
                        <div key={b} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                          <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{b}</span>
                          <input
                            style={{ width: 60, padding: "6px 8px", borderRadius: 6, border: "1px solid #ddd", textAlign: "right", fontSize: 13 }}
                            defaultValue={budget.rateio.fixed[b] || 0}
                            onBlur={function(e) {
                              var v = parseFloat(e.target.value) || 0;
                              setBudget(function(prev) {
                                var next = JSON.parse(JSON.stringify(prev));
                                next.rateio.fixed[b] = v;
                                return next;
                              });
                            }}
                          />
                          <span style={{ fontSize: 12, color: "#999" }}>{"%"}</span>
                        </div>
                      );
                    })}
                    <div style={{ marginTop: 8, fontSize: 12, color: totalFixed === 100 ? COLORS.teal : COLORS.red, fontWeight: 600 }}>
                      {"Total: " + totalFixed.toFixed(1) + "%" + (totalFixed !== 100 ? " (deve somar 100%)" : " ✓")}
                    </div>
                  </div>
                )}

                <div style={{ marginTop: 20, display: "flex", justifyContent: "flex-end" }}>
                  <button onClick={function() { setShowRateioConfig(false); }} style={{
                    padding: "8px 20px", borderRadius: 6, border: "none", background: COLORS.navy, color: "#fff",
                    fontSize: 13, cursor: "pointer", fontFamily: "Poppins, sans-serif", fontWeight: 600,
                  }}>{"Fechar"}</button>
                </div>
              </div>
            </div>
          );
        }

        // ─── ADD BRANCH MODAL ────────────────────────────────
        function renderAddBranchModal() {
          if (!showAddBranch) return null;
          var nameRef = React.createRef();
          return (
            <div style={{
              position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999
            }} onClick={function(e) { if (e.target === e.currentTarget) setShowAddBranch(false); }}>
              <div style={{ background: "#fff", borderRadius: 12, padding: 32, width: 380 }}>
                <h3 style={{ margin: "0 0 16px", fontSize: 16, color: COLORS.navy }}>{"Nova Filial"}</h3>
                <input
                  ref={nameRef}
                  style={{ width: "100%", padding: "10px 12px", borderRadius: 6, border: "1px solid #ddd", fontSize: 14, boxSizing: "border-box", marginBottom: 16 }}
                  placeholder="Nome da filial"
                  autoFocus
                />
                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                  <button onClick={function() { setShowAddBranch(false); }} style={{
                    padding: "8px 16px", borderRadius: 6, border: "1px solid #ddd", background: "#fff",
                    color: "#666", fontSize: 13, cursor: "pointer",
                  }}>{"Cancelar"}</button>
                  <button onClick={function() {
                    var name = nameRef.current ? nameRef.current.value.trim().toUpperCase() : "";
                    if (name) { addBudgetBranch(name, "simulacao"); setShowAddBranch(false); }
                  }} style={{
                    padding: "8px 16px", borderRadius: 6, border: "none", background: COLORS.teal,
                    color: "#fff", fontSize: 13, cursor: "pointer", fontWeight: 600,
                  }}>{"Criar"}</button>
                </div>
              </div>
            </div>
          );
        }

        // ─── MAIN ORÇAMENTO LAYOUT ───────────────────────────
        var budgetXlsxRef = React.createRef();

        return (
          <div style={{ padding: "20px 24px" }}>
            {renderRateioModal()}
            {renderAddBranchModal()}

            {/* Header toolbar */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center", marginBottom: 16 }}>
              <h2 style={{ margin: 0, fontSize: 16, color: COLORS.navy, marginRight: 8 }}>{"Orçamento " + budget.year}</h2>

              <SegmentedButton
                options={[{ value: "editor", label: "Editor" }, { value: "bva", label: "Orçado vs Real" }]}
                selected={budgetView}
                onChange={setBudgetView}
              />

              <div style={{ width: 1, height: 28, background: "#e0e0e0" }} />

              <button onClick={function() { setShowRateioConfig(true); }} style={headerBtnStyle}>
                <Settings size={13} /> {"Rateio"}
              </button>
              <button onClick={function() { setShowAddBranch(true); }} style={headerBtnStyle}>
                <Plus size={13} /> {"Nova filial"}
              </button>

              {budgetBranch && parsedData[budgetBranch] && (
                <button onClick={function() { importBaselineForBranch(budgetBranch); }} style={Object.assign({}, headerBtnStyle, { color: COLORS.teal, borderColor: COLORS.teal })}>
                  <Download size={13} /> {"Importar realizado"}
                </button>
              )}

              {budgetBranch && parsedData[budgetBranch] && (
                <button onClick={function() { fillFromHistory(budgetBranch); }} style={Object.assign({}, headerBtnStyle, { color: COLORS.orange, borderColor: COLORS.orange })}>
                  {"Preencher com Histórico"}
                </button>
              )}

              <div style={{ flex: 1 }} />

              <button onClick={exportBudgetXLSX} style={Object.assign({}, headerBtnStyle, { color: COLORS.navy })}>
                <Download size={13} /> {"Exportar Excel"}
              </button>
              <label style={Object.assign({}, headerBtnStyle, { color: COLORS.navy, cursor: "pointer" })}>
                <Upload size={13} /> {"Importar Excel"}
                <input ref={budgetXlsxRef} type="file" accept=".xlsx" style={{ display: "none" }}
                  onChange={function(e) { if (e.target.files[0]) importBudgetXLSX(e.target.files[0]); }}
                />
              </label>
            </div>

            {/* Branch selector */}
            <div style={{ display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap", marginBottom: 12 }}>
              <span style={{ fontSize: 11, color: "#999", marginRight: 4 }}>{"Filiais:"}</span>
              {budgetBranches.map(function(b) {
                var isSelected = selectedBudgetBranches.indexOf(b) >= 0;
                var isEditing = budgetBranch === b;
                var bType = budget.branches[b].type;
                var typeColor = bType === "backoffice" ? COLORS.orange : bType === "simulacao" ? "#9b59b6" : COLORS.navy;
                return (
                  <div key={b} style={{ display: "flex", alignItems: "center", gap: 0 }}>
                    <button
                      onClick={function() {
                        setSelectedBudgetBranches(function(prev) {
                          var idx = prev.indexOf(b);
                          if (idx >= 0) { var n = prev.slice(); n.splice(idx, 1); return n; }
                          return prev.concat([b]);
                        });
                      }}
                      style={{
                        padding: "4px 10px", fontSize: 11, fontWeight: 600,
                        borderRadius: isEditing ? "6px 0 0 6px" : 6,
                        border: "1px solid " + (isSelected ? typeColor : "#ddd"),
                        background: isSelected ? typeColor + "15" : "#fff",
                        color: isSelected ? typeColor : "#999",
                        cursor: "pointer", fontFamily: "Poppins, sans-serif",
                      }}
                    >
                      {b + (bType === "backoffice" ? " (back)" : bType === "simulacao" ? " (sim)" : "")}
                    </button>
                    {budgetView === "editor" && (
                      <button
                        onClick={function() { setBudgetBranch(b); }}
                        style={{
                          padding: "4px 8px", fontSize: 10, borderRadius: "0 6px 6px 0",
                          border: "1px solid " + (isEditing ? COLORS.teal : "#ddd"), borderLeft: "none",
                          background: isEditing ? COLORS.teal : "#f5f5f5",
                          color: isEditing ? "#fff" : "#999",
                          cursor: "pointer", fontWeight: 600,
                        }}
                      >
                        {"Editar"}
                      </button>
                    )}
                    {bType === "simulacao" && (
                      <button
                        onClick={function() { if (confirm("Remover " + b + "?")) removeBudgetBranch(b); }}
                        style={{ padding: "4px 6px", border: "none", background: "transparent", cursor: "pointer", color: "#ccc" }}
                      >
                        <Trash size={12} />
                      </button>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Content */}
            <div style={{ background: "#fff", borderRadius: 12, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
              {budgetView === "editor" ? renderEditor() : renderBVA()}
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════
      // MAIN RENDER
      // ═══════════════════════════════════════════════════════
      // ═══════════════════════════════════════════════════════
      // ─── LOJAS TAB ─────────────────────────────────────────
      // ═══════════════════════════════════════════════════════

      function saveStoreGroups(groups) {
        setStoreGroups(groups);
        try { localStorage.setItem(STORE_GROUPS_KEY, JSON.stringify(groups)); } catch(e) {}
      }

      // ─── LOJAS: collect store data respecting selectedPeriods ───
      var STORE_BLACKLIST = /^(cliente|total)$/i;
      var _storeMap = {};
      var _activePeriods = selectedPeriods.length > 0 ? selectedPeriods : periods;
      Object.keys(parsedData).forEach(function(branch) {
        Object.keys(parsedData[branch]).forEach(function(period) {
          if (_activePeriods.indexOf(period) < 0) return; // respect period filter
          var d = parsedData[branch][period];
          if (!d || !d.fatvm || !d.fatvm.stores) return;
          d.fatvm.stores.forEach(function(s) {
            if (STORE_BLACKLIST.test(String(s.nome || "").trim())) return; // skip headers
            if (!_storeMap[s.nome]) _storeMap[s.nome] = { nome: s.nome, periods: {} };
            _storeMap[s.nome].periods[period] = {
              valor: s.valor, desconto: s.desconto,
              qtdVendas: s.qtdVendas, qtdItens: s.qtdItens,
              ticketMedio: s.qtdVendas > 0 ? s.valor / s.qtdVendas : 0,
              itensPorVenda: s.qtdVendas > 0 ? s.qtdItens / s.qtdVendas : 0
            };
          });
        });
      });
      var allStoreData = Object.values(_storeMap).map(function(st) {
        var pKeys = Object.keys(st.periods).sort();
        var totals = { valor: 0, desconto: 0, qtdVendas: 0, qtdItens: 0 };
        pKeys.forEach(function(p) {
          var d = st.periods[p];
          totals.valor += d.valor; totals.desconto += d.desconto;
          totals.qtdVendas += d.qtdVendas; totals.qtdItens += d.qtdItens;
        });
        totals.ticketMedio = totals.qtdVendas > 0 ? totals.valor / totals.qtdVendas : 0;
        totals.itensPorVenda = totals.qtdVendas > 0 ? totals.qtdItens / totals.qtdVendas : 0;
        return { nome: st.nome, periods: st.periods, totals: totals, periodKeys: pKeys, periodCount: pKeys.length };
      }).sort(function(a, b) { return b.totals.valor - a.totals.valor; });

      // storePeriods (only selected)
      var _pSet = {};
      allStoreData.forEach(function(s) { s.periodKeys.forEach(function(p) { _pSet[p] = true; }); });
      var storePeriods = Object.keys(_pSet).sort();

      // filteredStores: apply excludedStores, search, group, sort
      var filteredStores = allStoreData.filter(function(s) { return excludedStores.indexOf(s.nome) < 0; });
      if (storeSelectedGroup !== "all") {
        var _grp = storeGroups.find(function(g) { return g.name === storeSelectedGroup; });
        if (_grp) { filteredStores = filteredStores.filter(function(s) { return _grp.stores.indexOf(s.nome) >= 0; }); }
      }
      if (storeFilter) {
        var _q = storeFilter.toLowerCase();
        filteredStores = filteredStores.filter(function(s) { return s.nome.toLowerCase().indexOf(_q) >= 0; });
      }
      var _sortParts = storeSort.split("_");
      var _sortField = _sortParts[0];
      var _sortDir = _sortParts[1] === "asc" ? 1 : -1;
      filteredStores.sort(function(a, b) {
        var va = _sortField === "nome" ? a.nome : (a.totals[_sortField] || 0);
        var vb = _sortField === "nome" ? b.nome : (b.totals[_sortField] || 0);
        if (typeof va === "string") return _sortDir * va.localeCompare(vb);
        return _sortDir * (va - vb);
      });

      // paretoData (based on visible stores only)
      var _paretoSource = filteredStores.slice().sort(function(a, b) { return b.totals.valor - a.totals.valor; });
      var _grandTotalP = _paretoSource.reduce(function(s, st) { return s + st.totals.valor; }, 0);
      var _cum = 0;
      var paretoData = _paretoSource.map(function(s, i) {
        _cum += s.totals.valor;
        return { nome: s.nome, valor: s.totals.valor, pct: _grandTotalP > 0 ? s.totals.valor / _grandTotalP : 0, cumPct: _grandTotalP > 0 ? _cum / _grandTotalP : 0, rank: i + 1 };
      });

      function renderLojas() {
        if (allStoreData.length === 0) {
          return (
            <div style={{ padding: 60, textAlign: "center", color: "#999" }}>
              <Store size={48} color="#ccc" />
              <p style={{ marginTop: 16, fontSize: 16 }}>{"Nenhum dado de lojas dispon\u00edvel."}</p>
              <p style={{ fontSize: 13, marginTop: 4 }}>{"Fa\u00e7a upload de arquivos FATvm para visualizar dados por loja."}</p>
            </div>
          );
        }

        // KPIs based on VISIBLE (filtered) stores
        var grandTotal = filteredStores.reduce(function(s, st) { return s + st.totals.valor; }, 0);
        var grandVendas = filteredStores.reduce(function(s, st) { return s + st.totals.qtdVendas; }, 0);
        var grandItens = filteredStores.reduce(function(s, st) { return s + st.totals.qtdItens; }, 0);
        var grandTicket = grandVendas > 0 ? grandTotal / grandVendas : 0;
        var visibleCount = filteredStores.length;

        var cardStyle = {
          background: "#fff", borderRadius: 10, padding: "10px 14px",
          boxShadow: "0 1px 4px rgba(0,0,0,0.06)", flex: "1 1 140px", minWidth: 130
        };
        var labelStyle = { fontSize: 10, color: "#888", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px" };
        var bigNumStyle = { fontSize: 18, fontWeight: 700, color: COLORS.navy, marginTop: 2 };

        function openNewGroup() {
          setEditGroupIdx(-1); setEditGroupName(""); setEditGroupStores([]); setShowStoreGroupModal(true);
        }
        function openEditGroup(idx) {
          var g = storeGroups[idx];
          setEditGroupIdx(idx); setEditGroupName(g.name); setEditGroupStores(g.stores.slice()); setShowStoreGroupModal(true);
        }
        function saveGroup() {
          if (!editGroupName.trim()) return;
          var newGroups = storeGroups.slice();
          var obj = { name: editGroupName.trim(), stores: editGroupStores };
          if (editGroupIdx >= 0) { newGroups[editGroupIdx] = obj; } else { newGroups.push(obj); }
          saveStoreGroups(newGroups);
          setShowStoreGroupModal(false);
        }
        function deleteGroup(idx) {
          var newGroups = storeGroups.slice();
          newGroups.splice(idx, 1);
          saveStoreGroups(newGroups);
          if (storeSelectedGroup === storeGroups[idx].name) setStoreSelectedGroup("all");
        }
        function toggleGroupStore(nome) {
          setEditGroupStores(function(prev) {
            var idx = prev.indexOf(nome);
            if (idx >= 0) { var n = prev.slice(); n.splice(idx, 1); return n; }
            return prev.concat([nome]);
          });
        }
        function toggleStoreVisibility(nome) {
          setExcludedStores(function(prev) {
            var idx = prev.indexOf(nome);
            if (idx >= 0) { var n = prev.slice(); n.splice(idx, 1); return n; }
            return prev.concat([nome]);
          });
        }

        var sortOptions = [
          { value: "valor_desc", label: "Faturamento \u2193" },
          { value: "valor_asc", label: "Faturamento \u2191" },
          { value: "ticketMedio_desc", label: "Ticket M\u00e9dio \u2193" },
          { value: "ticketMedio_asc", label: "Ticket M\u00e9dio \u2191" },
          { value: "qtdVendas_desc", label: "Qtd Vendas \u2193" },
          { value: "qtdVendas_asc", label: "Qtd Vendas \u2191" },
          { value: "nome_asc", label: "Nome A-Z" },
          { value: "nome_desc", label: "Nome Z-A" },
        ];

        // Sidebar store list sorted by valor desc
        var sidebarStores = allStoreData.slice().sort(function(a, b) { return b.totals.valor - a.totals.valor; });

        // ── Compute ABC summary for donut ──
        var abcSummary = { A: { count: 0, valor: 0 }, B: { count: 0, valor: 0 }, C: { count: 0, valor: 0 } };
        paretoData.forEach(function(p) {
          var cls = p.cumPct <= 0.8 ? "A" : p.cumPct <= 0.95 ? "B" : "C";
          abcSummary[cls].count++; abcSummary[cls].valor += p.valor;
        });
        var donutData = [
          { name: "A", value: abcSummary.A.valor, count: abcSummary.A.count, fill: COLORS.teal },
          { name: "B", value: abcSummary.B.valor, count: abcSummary.B.count, fill: COLORS.amber },
          { name: "C", value: abcSummary.C.valor, count: abcSummary.C.count, fill: "#ccc" }
        ].filter(function(d) { return d.value > 0; });

        // ── Scatter data: ticket x vendas ──
        var scatterData = filteredStores.map(function(st) {
          var pEntry = paretoData.find(function(p) { return p.nome === st.nome; });
          var abc = pEntry ? (pEntry.cumPct <= 0.8 ? "A" : pEntry.cumPct <= 0.95 ? "B" : "C") : "C";
          return { nome: st.nome, x: st.totals.qtdVendas, y: st.totals.ticketMedio, valor: st.totals.valor, abc: abc };
        });

        // ── Top 5 / Bottom 5 ──
        var top5 = filteredStores.slice(0, 5);
        var bottom5 = filteredStores.length > 5 ? filteredStores.slice(-5).reverse() : [];

        // Sidebar stores sorted by valor desc and filtered by search
        var sidebarStores = allStoreData.slice().sort(function(a, b) { return b.totals.valor - a.totals.valor; });
        var filteredSidebar = sidebarStores.filter(function(st) {
          if (!storeFilter) return true;
          return st.nome.toLowerCase().indexOf(storeFilter.toLowerCase()) >= 0;
        });

        return (
          <div style={{ display: "flex", flexDirection: "column", overflowY: "auto", maxHeight: "calc(100vh - 120px)" }}>
            {/* ── TOP SECTION: sidebar + KPIs + Pareto row ── */}
            <div style={{ display: "flex", gap: 0, alignItems: "stretch" }}>
            {/* ── SIDEBAR: store checkboxes in 2 columns ── */}
            <div style={{
              width: 310, minWidth: 310, background: "#fff", borderRight: "1px solid #eee",
              overflowY: "auto", overflowX: "hidden", padding: "10px 0",
              boxShadow: "2px 0 8px rgba(0,0,0,0.03)"
            }}>
              <div style={{ padding: "0 10px 6px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: COLORS.navy, textTransform: "uppercase", letterSpacing: "0.5px" }}>
