    // ─── HELPERS ─────────────────────────────────────────────
    function fmtBRL(v) {
      if (v == null || isNaN(v)) return "—";
      var abs = Math.abs(Math.round(v));
      var str = abs.toLocaleString("pt-BR");
      return (v < 0 ? "-R$ " : "R$ ") + str;
    }

    function fmtBRLFull(v) {
      if (v == null || isNaN(v)) return "—";
      return (v < 0 ? "-R$ " : "R$ ") + Math.abs(v).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(v) {
      if (v == null || isNaN(v) || !isFinite(v)) return "—";
      return (v * 100).toFixed(1).replace(".", ",") + "%";
    }

    function fmtDelta(v) {
      if (v == null || isNaN(v) || !isFinite(v)) return "—";
      var pct = (v * 100).toFixed(1).replace(".", ",");
      return (v >= 0 ? "+" : "") + pct + "%";
    }

    function parseFilename(name) {
      // Padrão FATVM (VMPAY): YYYY-MM_FATvm_BRANCH.xlsx
      var matchVM = name.match(/^(\d{4}-\d{2})_FATvm_(.+)\.xlsx$/i);
      if (matchVM) return { period: matchVM[1], type: "FATVM", branch: matchVM[2] };
      // Padrão mensal: YYYY-MM_TIPO_BRANCH.xlsx
      var match = name.match(/^(\d{4}-\d{2})_(DESP|FAT|COM)_(.+)\.xlsx$/i);
      if (match) return { period: match[1], type: match[2].toUpperCase(), branch: match[3] };
      // Padrão agregado: YYYY_DESP_BRANCH.xlsx (ou qualquer nome — detecção real é pela sheet DBM)
      var match2 = name.match(/^(\d{4})_(DESP|FAT|COM)_(.+)\.xlsx$/i);
      if (match2) return { period: null, type: match2[2].toUpperCase(), branch: match2[3], aggregated: true };
      return null;
    }

    function numVal(v) {
      if (v == null) return 0;
      if (typeof v === "number") return v;
      var s = String(v).replace(/[^\d.,-]/g, "").replace(",", ".");
      var n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    }

    function periodLabel(p) {
      if (!p || typeof p !== "string") return String(p || "");
      var parts = p.split("-");
      if (parts.length < 2) return String(p);
      var months = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
      var idx = parseInt(parts[1], 10) - 1;
      return months[idx] + "/" + parts[0];
    }

    function quarterOf(p) {
      var parts = p.split("-");
      var q = Math.ceil(parseInt(parts[1], 10) / 3);
      return parts[0] + "-Q" + q;
    }
    function quarterLabel(key) {
      // "2025-Q4" → "4T/2025"
      var m = key.match(/^(\d{4})-Q(\d)$/);
      return m ? m[2] + "T/" + m[1] : String(key);
    }

    function semesterOf(p) {
      var parts = p.split("-");
      var s = parseInt(parts[1], 10) <= 6 ? 1 : 2;
      return parts[0] + "-S" + s;
    }
    function semesterLabel(key) {
      // "2025-S2" → "2S/2025"
      var m = key.match(/^(\d{4})-S(\d)$/);
      return m ? m[2] + "S/" + m[1] : String(key);

    function yearOf(p) {

    function Sparkline({ values, inverted }) {
      if (!values || values.length < 2) return null;
      var w = 80, h = 24, pad = 2;
      var filtered = values.filter(function(v) { return v != null && !isNaN(v); });
      if (filtered.length < 2) return null;
      var min = Math.min.apply(null, filtered);
      var max = Math.max.apply(null, filtered);
      var range = max - min || 1;
      var points = filtered.map(function(v, i) {
        var x = pad + (i / (filtered.length - 1)) * (w - 2 * pad);
        var y = pad + (1 - (v - min) / range) * (h - 2 * pad);
        return x + "," + y;
      });
      var last = filtered[filtered.length - 1];
      var first = filtered[0];
      var trending = inverted ? last < first : last > first;
      var dotColor = trending ? COLORS.teal : COLORS.red;
      var lastParts = points[points.length - 1].split(",");

      return (
        <svg width={w} height={h} style={{ display: "inline-block", verticalAlign: "middle", marginLeft: 6 }}>
          <polyline fill="none" stroke="#999" strokeWidth="1.5" points={points.join(" ")} />
          <circle cx={parseFloat(lastParts[0])} cy={parseFloat(lastParts[1])} r="2.5" fill={dotColor} />
        </svg>
      );
    }

    // ─── PARSING FUNCTIONS ───────────────────────────────────
    function normalizeRange(ws) {
      if (ws && ws["!ref"]) {
        var range = XLSX.utils.decode_range(ws["!ref"]);
        range.s.c = 0;
        ws["!ref"] = XLSX.utils.encode_range(range);
      }
    }

    function parseDESP(wb) {
      var ws = wb.Sheets["rptFinanceiro"];
      if (!ws) return null;
      normalizeRange(ws);
      var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      var groups = {};
      var currentGroup = null;
      var firstGroupFound = false;

      for (var i = 10; i < data.length; i++) {
        var row = data[i];
        if (!row || row.length === 0) continue;
        var colA = String(row[0] || "").trim();
        var colB = String(row[1] || "").trim();
        var colG = row[6];

        if (colA && /^Total\s+de|TOTAL\s+GERAL/i.test(colA)) continue;

        var groupMatch = colA.match(/^(\d{2})\s*-\s*(.+)$/);
        if (groupMatch) {
          firstGroupFound = true;
          var code = groupMatch[1];
          var name = groupMatch[2].trim();
          currentGroup = code;
          if (!groups[code]) {
            groups[code] = { code: code, name: name, items: {} };
          }
          // NÃO dar continue — colB na mesma linha pode ter o primeiro item do grupo
        }

        if (colA && !firstGroupFound) continue;

        if (currentGroup && colB) {
          if (/^Total\s+de|^TOTAL\s+GERAL|^TOTAL:/i.test(colB)) continue;
          var val = numVal(colG);
          if (val === 0 && !groups[currentGroup].items[colB]) continue;
          if (!groups[currentGroup].items[colB]) {
            groups[currentGroup].items[colB] = 0;
          }
          groups[currentGroup].items[colB] += val;
        }
      }
      return groups;
    }

    // Parser para DESP no formato DBM (arquivo agregado com múltiplos meses)
    function parseDESP_DBM(wb) {
      var ws = wb.Sheets["DBM"];
      if (!ws) return null;
      normalizeRange(ws);
      var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

      // Converte serial Excel para "YYYY-MM"
      function serialToYM(serial) {
        if (!serial || typeof serial !== "number") return null;
        var d = new Date((serial - 25569) * 86400000);
        var y = d.getUTCFullYear();
        var m = ("0" + (d.getUTCMonth() + 1)).slice(-2);
        return y + "-" + m;
      }

      // result: { "YYYY-MM": { "01": { code, name, items: { itemName: valor } }, ... } }
      var result = {};

      for (var i = 1; i < data.length; i++) {
        var row = data[i];
        var tipo = String(row[0] || "").trim();
        if (!tipo) continue;

        var gMatch = tipo.match(/^(\d+)\s*-\s*(.+)/);
        if (!gMatch) continue;

        var code = gMatch[1].replace(/^0(\d)$/, "0$1");
        if (code.length === 1) code = "0" + code;
        var groupName = gMatch[2].trim();
        var itemName = String(row[1] || "").trim() || groupName;
        var compet = row[2];
        var pagto = String(row[6] || "").trim();
        var pendente = String(row[9] || "").trim();
        if (!pagto && !pendente) continue;
        var valor = typeof row[4] === "number" ? row[4] : numVal(row[4]);
        if (valor === 0) continue;

        var ym = serialToYM(compet);
        if (!ym) continue;

        if (!result[ym]) result[ym] = {};
        if (!result[ym][code]) result[ym][code] = { code: code, name: groupName, items: {} };
        result[ym][code].items[itemName] = (result[ym][code].items[itemName] || 0) + valor;
      }

      return result;
    }

    function parseFAT(wb) {
      var ws = wb.Sheets["rptVendaDiariaAcumuladoConsolid"];
      if (!ws) return null;
      normalizeRange(ws);
      var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      var totalVenda = 0, totalCusto = 0, totalClientes = 0, totalProdutos = 0;
      var foundTotal = false;

      function rowText(row) {
        return String(row[0] || "").trim() + " " + String(row[1] || "").trim() + " " + String(row[2] || "").trim() + " " + String(row[3] || "").trim();
      }

      for (var i = 9; i < data.length; i++) {
        var row = data[i];
        if (!row) continue;
        var txt = rowText(row);

        if (/Total\s+de|TOTAL\s+GERAL/i.test(txt)) {
          totalVenda = numVal(row[6]);
          totalCusto = numVal(row[9]);
          totalClientes = numVal(row[16]);
          totalProdutos = numVal(row[18]);
          foundTotal = true;
          break;
        }
      }

      if (!foundTotal) {
        for (var j = 9; j < data.length; j++) {
          var r = data[j];
          if (!r) continue;
          var t = rowText(r);
          if (/Total|TOTAL/i.test(t)) continue;
          if (!r[6] && !r[9]) continue;
          totalVenda += numVal(r[6]);
          totalCusto += numVal(r[9]);
          totalClientes += numVal(r[16]);
          totalProdutos += numVal(r[18]);
        }
      }

      return { venda: totalVenda, custo: totalCusto, clientes: totalClientes, produtos: totalProdutos };
    }

    function parseFATVM(wb) {
      var ws = wb.Sheets["Transações cashless por venda"];
      if (!ws) return null;
      normalizeRange(ws);
      var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      var stores = [];
      var totalVenda = 0, totalDesconto = 0, totalQtdVendas = 0, totalQtdItens = 0;
      var foundTotal = false;

      // Headers at row 17 (index 16): Cliente | Valor (R$) | % | Desconto (R$) | % | Qtde vendas | % | Qtde itens | %
      // Data starts at row 18 (index 17)
      for (var i = 17; i < data.length; i++) {
        var row = data[i];
        if (!row) continue;
        var cliente = String(row[0] || "").trim();
        if (!cliente) continue;

        if (/^Total$/i.test(cliente)) {
          totalVenda = numVal(row[1]);
          totalDesconto = numVal(row[3]);
          totalQtdVendas = numVal(row[5]);
          totalQtdItens = numVal(row[7]);
          foundTotal = true;
          break;
        }

        stores.push({
          nome: cliente,
          valor: numVal(row[1]),
          desconto: numVal(row[3]),
          qtdVendas: numVal(row[5]),
          qtdItens: numVal(row[7])
        });
      }

      // Fallback: soma manual se não achou Total
      if (!foundTotal && stores.length > 0) {
        stores.forEach(function(s) {
          totalVenda += s.valor;
          totalDesconto += s.desconto;
          totalQtdVendas += s.qtdVendas;
          totalQtdItens += s.qtdItens;
        });
      }

      return {
        venda: totalVenda,
        desconto: totalDesconto,
        qtdVendas: totalQtdVendas,
        qtdItens: totalQtdItens,
        stores: stores,
        storeCount: stores.length
      };
    }

    function parseCOM(wb) {
      var ws = wb.Sheets["rptBalanceteResumo"];
      if (!ws) return null;
      normalizeRange(ws);
      var data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      var categories = [];
      var totalCompraLiq = 0, totalVenda = 0, totalLucro = 0;

      for (var i = 12; i < data.length; i++) {
        var row = data[i];
        if (!row) continue;
        var colA = String(row[0] || "").trim();

        // Row sem label mas com valores numéricos = linha de subtotal (captura como fallback)
        if (!colA) {
          var maybeTotal = numVal(row[19]);
          if (maybeTotal !== 0) {

            result.fatvm.desconto += d.fatvm.desconto;

            result.fatvm.qtdItens += d.fatvm.qtdItens;
            result.fatvm.stores = result.fatvm.stores.concat(d.fatvm.stores);
            result.fatvm.storeCount += d.fatvm.storeCount;
          } else if (d.fat) {
            result.fat.venda += d.fat.venda;
            result.fat.custo += d.fat.custo;
            result.fat.clientes += d.fat.clientes;
            result.fat.produtos += d.fat.produtos;
          }

          if (d.com) {
            result.com.totalCompraLiq += d.com.totalCompraLiq;
            result.com.totalVenda += d.com.totalVenda;
            result.com.totalLucro += d.com.totalLucro;
            if (d.com.categories) {
              d.com.categories.forEach(function(cat) {
                var existing = result.com.categories.find(function(c) { return c.nome === cat.nome; });
                if (existing) {
                  existing.compraBruta += cat.compraBruta;
                  existing.compraLiq += cat.compraLiq;
                  existing.venda += cat.venda;
                  existing.lucro += cat.lucro;
                } else {
                  result.com.categories.push({ nome: cat.nome, compraBruta: cat.compraBruta, compraLiq: cat.compraLiq, venda: cat.venda, lucro: cat.lucro, margem: cat.margem });
                }
              });
            }
          }
        });
        result.com.categories.forEach(function(c) {
          c.margem = c.venda !== 0 ? (c.lucro / c.venda) * 100 : 0;
        });
        return result;
      }, [parsedData, selectedBranches]);

      // getData now always consolidates over selectedBranches
      var getData = useCallback(function(period) {
        return getConsolidated(period);
      }, [getConsolidated]);

      // ─── PERIOD GROUPING ──────────────────────────────────
      var displayPeriods = useMemo(function() {
        var sorted = selectedPeriods.slice().sort();
        if (grouping === "mensal") return sorted;
        if (grouping === "trimestral") {
          var qMap = {};
          sorted.forEach(function(p) {
            var q = quarterOf(p);
            if (!qMap[q]) qMap[q] = [];
            qMap[q].push(p);
          });
          return Object.keys(qMap).sort();
        }
        if (grouping === "semestral") {
          var sMap = {};
          sorted.forEach(function(p) {
            var s = semesterOf(p);
            if (!sMap[s]) sMap[s] = [];
            sMap[s].push(p);
          });
          return Object.keys(sMap).sort();
        }
        var yMap = {};
        sorted.forEach(function(p) {
          var y = yearOf(p);
          if (!yMap[y]) yMap[y] = [];
          yMap[y].push(p);
        });
        return Object.keys(yMap).sort();
      }, [selectedPeriods, grouping]);

      var getAggregatedData = useCallback(function(displayPeriod) {
        if (grouping === "mensal") return getData(displayPeriod);

        var monthsInGroup;
        if (grouping === "trimestral") {
          monthsInGroup = selectedPeriods.filter(function(p) { return quarterOf(p) === displayPeriod; }).sort();
        } else if (grouping === "semestral") {
          monthsInGroup = selectedPeriods.filter(function(p) { return semesterOf(p) === displayPeriod; }).sort();
        } else {
          monthsInGroup = selectedPeriods.filter(function(p) { return yearOf(p) === displayPeriod; }).sort();
        }

        var agg = {
          desp: {},
          fat: { venda: 0, custo: 0, clientes: 0, produtos: 0 },
          com: { categories: [], totalCompraLiq: 0, totalVenda: 0, totalLucro: 0 },
          fatvm: null
        };

        monthsInGroup.forEach(function(p) {
          var d = getData(p);
          if (d.desp) {
            Object.keys(d.desp).forEach(function(code) {
              var group = d.desp[code];
              if (!agg.desp[code]) agg.desp[code] = { code: code, name: group.name, items: {} };
              Object.keys(group.items).forEach(function(item) {
                agg.desp[code].items[item] = (agg.desp[code].items[item] || 0) + group.items[item];
              });
            });
          }
          // fat já vem ajustado por VMPAY via getConsolidated
          if (d.fat) {
            agg.fat.venda += d.fat.venda;
            agg.fat.custo += d.fat.custo;
            agg.fat.clientes += d.fat.clientes;
            agg.fat.produtos += d.fat.produtos;
          }
          if (d.fatvm) {
            if (!agg.fatvm) agg.fatvm = { venda: 0, desconto: 0, qtdVendas: 0, qtdItens: 0, stores: [], storeCount: 0 };
            agg.fatvm.venda += d.fatvm.venda;
            agg.fatvm.desconto += d.fatvm.desconto;
            agg.fatvm.qtdVendas += d.fatvm.qtdVendas;
            agg.fatvm.qtdItens += d.fatvm.qtdItens;
            agg.fatvm.stores = agg.fatvm.stores.concat(d.fatvm.stores);
            agg.fatvm.storeCount += d.fatvm.storeCount;
          }
          if (d.com) {
            agg.com.totalCompraLiq += d.com.totalCompraLiq;
            agg.com.totalVenda += d.com.totalVenda;
            agg.com.totalLucro += d.com.totalLucro;
            if (d.com.categories) {
              d.com.categories.forEach(function(cat) {
                var ex = agg.com.categories.find(function(c) { return c.nome === cat.nome; });
                if (ex) {
                  ex.compraBruta += cat.compraBruta;
                  ex.compraLiq += cat.compraLiq;
                  ex.venda += cat.venda;
                  ex.lucro += cat.lucro;
                } else {
                  agg.com.categories.push({ nome: cat.nome, compraBruta: cat.compraBruta, compraLiq: cat.compraLiq, venda: cat.venda, lucro: cat.lucro, margem: cat.margem });
                }
              });
            }
          }
        });
        agg.com.categories.forEach(function(c) {
          c.margem = c.venda !== 0 ? (c.lucro / c.venda) * 100 : 0;
        });
        return agg;
      }, [grouping, selectedPeriods, getData]);

      // ─── DRE COMPUTATION ──────────────────────────────────
      function computeDRE(data) {
        var fat = data.fat || {};
        var desp = data.desp || {};
        var com = data.com || {};
        var fatvm = data.fatvm || null;

        // fat.venda e fat.custo já vêm ajustados por VMPAY via getConsolidated
        // (filiais com VMPAY contribuem receita VMPAY e CMV% × VMPAY na consolidação)
        var receitaBruta = fat.venda || 0;
        var cmv = fat.custo || 0;

        var impostosReceita = 0;
        var impostosDetail = {};
        if (desp["30"]) {
          Object.keys(desp["30"].items).forEach(function(k) {
            impostosReceita += desp["30"].items[k];
            impostosDetail[k] = desp["30"].items[k];
          });
        }

        var receitaLiquida = receitaBruta - impostosReceita;

        // Excluir "EXTRAS" de compras (equipamentos, não mercadoria)
        var comprasExtras = 0;
        if (com.categories) {
          com.categories.forEach(function(cat) {
            if (/^EXTRAS$/i.test(String(cat.nome || "").trim())) {
              comprasExtras += cat.compraLiq || 0;
            }
          });
        }
        var comprasBruta = com.totalCompraLiq || 0;
        var compras = comprasBruta - comprasExtras;
        var perda = compras - cmv;
        var lucroBruto = receitaLiquida - compras;

        var opexGroups = {};
        var totalOpex = 0;
        var newGroups = [];

        Object.keys(desp).forEach(function(code) {
          var group = desp[code];
          var mapped = GROUP_MAP[code];
          if (mapped && mapped.section === "opex") {
            var total = Object.values(group.items).reduce(function(s, v) { return s + v; }, 0);
            opexGroups[code] = { code: group.code, name: group.name, items: group.items, total: total, isNew: false };
            totalOpex += total;
          } else if (!mapped) {
            var t = Object.values(group.items).reduce(function(s, v) { return s + v; }, 0);
            opexGroups[code] = { code: group.code, name: group.name, items: group.items, total: t, isNew: true };
            totalOpex += t;
            newGroups.push(code);
          }
        });

        var ebitda = lucroBruto - totalOpex;

        var juros = 0, jurosDetail = {};
        if (desp["40"]) {
          Object.keys(desp["40"].items).forEach(function(k) { juros += desp["40"].items[k]; jurosDetail[k] = desp["40"].items[k]; });
        }

        var impostosParcelados = 0, impostosParceladosDetail = {};
        Object.keys(desp).forEach(function(code) {
          var mapped = GROUP_MAP[code];
          if (mapped && mapped.section === "impostos_parcelados") {
            var group = desp[code];
            Object.keys(group.items).forEach(function(k) {
              impostosParcelados += group.items[k];
              impostosParceladosDetail[k] = (impostosParceladosDetail[k] || 0) + group.items[k];
            });
          }
        });

        var impostosLucroGroups = {};
        var totalImpostosLucro = 0;
        Object.keys(desp).forEach(function(code) {
          var mapped = GROUP_MAP[code];
          if (mapped && mapped.section === "impostos_lucro") {
            var group = desp[code];
            var total = Object.values(group.items).reduce(function(s, v) { return s + v; }, 0);
            impostosLucroGroups[code] = { code: group.code, name: group.name, items: group.items, total: total };
            totalImpostosLucro += total;
          }
        });

        var sociedade = 0, socDetail = {};
        if (desp["50"]) {
          Object.keys(desp["50"].items).forEach(function(k) { sociedade += desp["50"].items[k]; socDetail[k] = desp["50"].items[k]; });
        }

        var lucroLiquido = ebitda - juros - impostosParcelados - totalImpostosLucro - sociedade;

        var capex = 0, capexDetail = {};
        if (desp["20"]) {
          Object.keys(desp["20"].items).forEach(function(k) { capex += desp["20"].items[k]; capexDetail[k] = desp["20"].items[k]; });
        }

        return {
          receitaBruta: receitaBruta, impostosReceita: impostosReceita, impostosDetail: impostosDetail,
          receitaLiquida: receitaLiquida, cmv: cmv, compras: compras, comprasExtras: comprasExtras, perda: perda,
          lucroBruto: lucroBruto, opexGroups: opexGroups, totalOpex: totalOpex, newGroups: newGroups,
          ebitda: ebitda, juros: juros, jurosDetail: jurosDetail,
          impostosParcelados: impostosParcelados, impostosParceladosDetail: impostosParceladosDetail,
          impostosLucroGroups: impostosLucroGroups, totalImpostosLucro: totalImpostosLucro,
          sociedade: sociedade, socDetail: socDetail,
          lucroLiquido: lucroLiquido, capex: capex, capexDetail: capexDetail,
          clientes: fat.clientes || 0, produtos: fat.produtos || 0,
          usouVMPAY: !!(fatvm && fatvm.venda > 0),
          vmPayVenda: fatvm ? fatvm.venda : 0,
          vmPayStores: fatvm ? fatvm.storeCount : 0,
          cmvPct: (fat.venda && fat.venda > 0) ? (fat.custo || 0) / fat.venda : 0
        };
      }

      var dreByPeriod = useMemo(function() {
        var result = {};
        displayPeriods.forEach(function(p) {
          result[p] = computeDRE(getAggregatedData(p));
        });
        return result;
      }, [displayPeriods, getAggregatedData]);

      var allMonthsDre = useMemo(function() {
        var result = {};
        periods.forEach(function(p) {
          result[p] = computeDRE(getData(p));
        });
        return result;
      }, [periods, getData]);

      // ─── PERIOD OPTIONS ───────────────────────────────────
      var availablePeriodOptions = useMemo(function() {
        if (grouping === "mensal") return periods;
        if (grouping === "trimestral") {
          var qs = {};
          periods.forEach(function(p) { qs[quarterOf(p)] = true; });
          return Object.keys(qs).sort();
        }
        if (grouping === "semestral") {
          var ss = {};
          periods.forEach(function(p) { ss[semesterOf(p)] = true; });
          return Object.keys(ss).sort();
        }
        var ys = {};
        periods.forEach(function(p) { ys[yearOf(p)] = true; });
        return Object.keys(ys).sort();
      }, [periods, grouping]);

      function togglePeriod(p) {
        setSelectedPeriods(function(prev) {
          var next = prev.slice();
          if (grouping === "mensal") {
            var idx = next.indexOf(p);
            if (idx >= 0) next.splice(idx, 1);
            else next.push(p);
          } else if (grouping === "trimestral") {
            var months = periods.filter(function(m) { return quarterOf(m) === p; });
            var allIn = months.every(function(m) { return next.indexOf(m) >= 0; });
            if (allIn) {
              months.forEach(function(m) { var i = next.indexOf(m); if (i >= 0) next.splice(i, 1); });
            } else {
              months.forEach(function(m) { if (next.indexOf(m) < 0) next.push(m); });
            }
          } else if (grouping === "semestral") {
            var sMonths = periods.filter(function(m) { return semesterOf(m) === p; });
            var sAllIn = sMonths.every(function(m) { return next.indexOf(m) >= 0; });
            if (sAllIn) {
              sMonths.forEach(function(m) { var i = next.indexOf(m); if (i >= 0) next.splice(i, 1); });
            } else {
              sMonths.forEach(function(m) { if (next.indexOf(m) < 0) next.push(m); });
            }
          } else {
            var yMonths = periods.filter(function(m) { return yearOf(m) === p; });
            var yAllIn = yMonths.every(function(m) { return next.indexOf(m) >= 0; });
            if (yAllIn) {
              yMonths.forEach(function(m) { var i = next.indexOf(m); if (i >= 0) next.splice(i, 1); });
            } else {
              yMonths.forEach(function(m) { if (next.indexOf(m) < 0) next.push(m); });
            }
          }
          return next;
        });
      }

      function isPeriodSelected(p) {
        if (grouping === "mensal") return selectedPeriods.indexOf(p) >= 0;
        if (grouping === "trimestral") {
          var months = periods.filter(function(m) { return quarterOf(m) === p; });
          return months.length > 0 && months.every(function(m) { return selectedPeriods.indexOf(m) >= 0; });
        }
        if (grouping === "semestral") {
          var sMonths = periods.filter(function(m) { return semesterOf(m) === p; });
          return sMonths.length > 0 && sMonths.every(function(m) { return selectedPeriods.indexOf(m) >= 0; });
        }
        var yMonths = periods.filter(function(m) { return yearOf(m) === p; });
        return yMonths.length > 0 && yMonths.every(function(m) { return selectedPeriods.indexOf(m) >= 0; });
      }

      // ─── COLLAPSE ─────────────────────────────────────────
      function toggleCollapse(key) {
        setCollapsed(function(prev) {
          var next = Object.assign({}, prev);
          if (next[key]) delete next[key];
          else next[key] = true;
          return next;
        });
      }

      function expandAll() { setCollapsed({}); }

      function collapseAll() {
        var all = {};
        Object.keys(GROUP_MAP).forEach(function(code) {
          if (GROUP_MAP[code].section === "opex") all["opex_" + code] = true;
        });
        displayPeriods.forEach(function(p) {
          var d = dreByPeriod[p];
          if (d && d.newGroups) {
            d.newGroups.forEach(function(code) { all["opex_" + code] = true; });
          }
        });
        all["impostos_receita"] = true;
        all["impostosParcelados"] = true;
        all["juros"] = true;
        all["totalImpostosLucro"] = true;
        all["sociedade"] = true;
        all["capex"] = true;
        setCollapsed(all);
      }

      // ─── HEATMAP ──────────────────────────────────────────
      function getHeatmapBg(values, currentVal, inverted) {
        if (!showHeatmap || values.length < 2 || currentVal == null) return "transparent";
        var nums = values.filter(function(v) { return v != null && !isNaN(v); });
        if (nums.length < 2) return "transparent";
        var min = Math.min.apply(null, nums);
        var max = Math.max.apply(null, nums);
        if (max === min) return "transparent";
        var ratio = (currentVal - min) / (max - min);
        if (inverted) ratio = 1 - ratio;
        if (ratio > 0.5) return "rgba(0, 142, 118, " + (ratio * 0.15) + ")";
        return "rgba(211, 68, 52, " + ((1 - ratio) * 0.15) + ")";
      }

      // ─── RENDER HELPERS ────────────────────────────────────
      function renderValue(val, rb, inverted) {
        if (val == null || isNaN(val)) return "—";
        var pct = rb ? val / rb : 0;
        var titleText = fmtBRLFull(val) + " (" + fmtPct(pct) + " RB)";
        var baseColor = val < 0 ? COLORS.red : COLORS.navy;
        if (valueMode === "pct") {
          return (
            <span title={titleText} style={{ color: baseColor }}>
              {fmtPct(pct)}
            </span>
          );
        }
        if (valueMode === "both") {
          return (
            <span title={titleText} style={{ color: baseColor }}>
              <span>{fmtBRL(val)}</span>
              <span style={{ color: "#999", fontSize: 10, marginLeft: 4 }}>{fmtPct(pct)}</span>
            </span>
          );
        }
        return (
          <span title={titleText} style={{ color: baseColor }}>
            {fmtBRL(val)}
          </span>
        );
      }

      function renderDeltaCol(curr, prev, inverted) {
        if (curr == null || prev == null || prev === 0) {
          return <td style={{ padding: "4px 6px", fontSize: 11, textAlign: "center", color: "#999", minWidth: 56 }}>{"—"}</td>;
        }
        var delta = (curr - prev) / Math.abs(prev);
        var color = inverted ? (delta > 0 ? COLORS.red : COLORS.teal) : (delta > 0 ? COLORS.teal : COLORS.red);
        return (
          <td style={{ padding: "4px 6px", fontSize: 11, textAlign: "center", color: color, fontWeight: 500, minWidth: 56, background: color + "10" }}>
            {fmtDelta(delta)}
          </td>
        );
      }

      // ─── BUILD DRE ROWS ───────────────────────────────────
      var dreRows = useMemo(function() {
        var rows = [];
        var allOpexCodes = {};
        displayPeriods.forEach(function(p) {
          var d = dreByPeriod[p];
          if (d) Object.keys(d.opexGroups).forEach(function(c) { allOpexCodes[c] = true; });
        });
        var sortedOpexCodes = Object.keys(allOpexCodes).sort();

        rows.push({ key: "receitaBruta", label: "RECEITA BRUTA", level: 0, highlight: true, getValue: function(d) { return d.receitaBruta; }, inverted: false, sparkKey: "receitaBruta", vmTag: function(d) { return d.usouVMPAY; } });
        rows.push({ key: "impostos_receita", label: "(-) Impostos sobre Receita", level: 1, collapsible: true, getValue: function(d) { return d.impostosReceita; }, inverted: true, sparkKey: "impostosReceita" });

        var allImpostos = {};
        displayPeriods.forEach(function(p) { var d = dreByPeriod[p]; if (d) Object.keys(d.impostosDetail).forEach(function(k) { allImpostos[k] = true; }); });
        Object.keys(allImpostos).sort().forEach(function(k) {
          rows.push({ key: "imp_" + k, label: k, level: 2, parent: "impostos_receita", getValue: function(d) { return d.impostosDetail[k] || 0; }, inverted: true });
        });

        rows.push({ key: "receitaLiquida", label: "RECEITA LÍQUIDA", level: 0, highlight: true, getValue: function(d) { return d.receitaLiquida; }, inverted: false, sparkKey: "receitaLiquida" });
        rows.push({ key: "sep1", separator: true });
        rows.push({ key: "compras", label: "( - ) COMPRAS (líquidas)", level: 0, getValue: function(d) { return d.compras; }, inverted: true, sparkKey: "compras" });
        rows.push({ key: "cmv", label: "CMV (referência)", level: 1, getValue: function(d) { return d.cmv; }, inverted: true, sparkKey: "cmv", vmTag: function(d) { return d.usouVMPAY; }, vmDetail: function(d) { return d.usouVMPAY ? "CMV% " + fmtPct(d.cmvPct) + " x VMPAY" : null; } });
        rows.push({
          key: "perda", label: "Perda (Compra - CMV)", level: 1,
          getValue: function(d) { return d.perda; }, inverted: true, sparkKey: "perda",
          warn: function(d) { return Math.abs(d.perda) > d.receitaBruta * 0.05; }
        });
        rows.push({ key: "sep2", separator: true });
        rows.push({ key: "lucroBruto", label: "LUCRO BRUTO", level: 0, highlight: true, getValue: function(d) { return d.lucroBruto; }, inverted: false, sparkKey: "lucroBruto" });
        rows.push({ key: "sep3", separator: true });
        rows.push({ key: "totalOpex", label: "DESPESAS OPERACIONAIS", level: 0, highlight: true, getValue: function(d) { return d.totalOpex; }, inverted: true, sparkKey: "totalOpex" });

        sortedOpexCodes.forEach(function(code) {
          var groupInfo = GROUP_MAP[code];
          var firstName = null;
          displayPeriods.forEach(function(p) {
            if (!firstName && dreByPeriod[p] && dreByPeriod[p].opexGroups[code]) {
              firstName = dreByPeriod[p].opexGroups[code].name;
            }
          });
          var name = groupInfo ? groupInfo.name : (firstName || "Grupo " + code);
          var isNew = !groupInfo;

          rows.push({
            key: "opex_" + code, label: name, level: 1, collapsible: true,
            getValue: function(d) { return d.opexGroups[code] ? d.opexGroups[code].total : 0; },
            inverted: true, isNew: isNew,
            sparkKey: "opex_" + code
          });

          var allItems = {};
          displayPeriods.forEach(function(p) {
            var d = dreByPeriod[p];
            if (d && d.opexGroups[code]) Object.keys(d.opexGroups[code].items).forEach(function(k) { allItems[k] = true; });
          });

          Object.keys(allItems).sort().forEach(function(item) {
            rows.push({
              key: "opex_" + code + "_" + item, label: item, level: 2, parent: "opex_" + code,
              getValue: function(d) { return d.opexGroups[code] ? (d.opexGroups[code].items[item] || 0) : 0; },
              inverted: true
            });
          });
        });

        rows.push({ key: "sep4", separator: true });
        rows.push({ key: "ebitda", label: "EBITDA", level: 0, highlight: true, accent: true, getValue: function(d) { return d.ebitda; }, inverted: false, sparkKey: "ebitda" });
        rows.push({ key: "sep5", separator: true });

        rows.push({ key: "juros", label: "Juros e Amortizações", level: 1, collapsible: true, getValue: function(d) { return d.juros; }, inverted: true, sparkKey: "juros" });
        var allJuros = {};
        displayPeriods.forEach(function(p) { var d = dreByPeriod[p]; if (d) Object.keys(d.jurosDetail).forEach(function(k) { allJuros[k] = true; }); });
        Object.keys(allJuros).sort().forEach(function(k) {
          rows.push({ key: "jur_" + k, label: k, level: 2, parent: "juros", getValue: function(d) { return d.jurosDetail[k] || 0; }, inverted: true });
        });

        rows.push({ key: "impostosParcelados", label: "Impostos Parcelados", level: 1, collapsible: true, getValue: function(d) { return d.impostosParcelados; }, inverted: true, sparkKey: "impostosParcelados" });
        var allImpParc = {};
        displayPeriods.forEach(function(p) { var d = dreByPeriod[p]; if (d) Object.keys(d.impostosParceladosDetail).forEach(function(k) { allImpParc[k] = true; }); });
        Object.keys(allImpParc).sort().forEach(function(k) {
          rows.push({ key: "impparc_" + k, label: k, level: 2, parent: "impostosParcelados", getValue: function(d) { return d.impostosParceladosDetail[k] || 0; }, inverted: true });
        });

        rows.push({ key: "totalImpostosLucro", label: "Impostos sobre o Lucro", level: 1, collapsible: true, getValue: function(d) { return d.totalImpostosLucro; }, inverted: true, sparkKey: "totalImpostosLucro" });
        var allImpLucroCodes = {};
        displayPeriods.forEach(function(p) {
          var d = dreByPeriod[p];
          if (d && d.impostosLucroGroups) Object.keys(d.impostosLucroGroups).forEach(function(code) {
            allImpLucroCodes[code] = true;
          });
        });
        Object.keys(allImpLucroCodes).sort().forEach(function(code) {
          var allItems = {};
          displayPeriods.forEach(function(p) {
            var d = dreByPeriod[p];
            if (d && d.impostosLucroGroups[code]) {
              Object.keys(d.impostosLucroGroups[code].items).forEach(function(k) { allItems[k] = true; });
            }
          });
          Object.keys(allItems).sort().forEach(function(item) {
            rows.push({
              key: "implucro_" + code + "_" + item, label: item, level: 2, parent: "totalImpostosLucro",
              getValue: function(d) { return d.impostosLucroGroups[code] ? (d.impostosLucroGroups[code].items[item] || 0) : 0; },
              inverted: true
            });
          });
        });

        rows.push({ key: "sociedade", label: "Pró-labore / Sociedade", level: 1, collapsible: true, getValue: function(d) { return d.sociedade; }, inverted: true, sparkKey: "sociedade" });
        var allSoc = {};
        displayPeriods.forEach(function(p) { var d = dreByPeriod[p]; if (d) Object.keys(d.socDetail).forEach(function(k) { allSoc[k] = true; }); });
        Object.keys(allSoc).sort().forEach(function(k) {
          rows.push({ key: "soc_" + k, label: k, level: 2, parent: "sociedade", getValue: function(d) { return d.socDetail[k] || 0; }, inverted: true });
        });

        rows.push({ key: "sep6", separator: true });
        rows.push({ key: "lucroLiquido", label: "LUCRO LÍQUIDO", level: 0, highlight: true, accent: true, getValue: function(d) { return d.lucroLiquido; }, inverted: false, sparkKey: "lucroLiquido" });
        rows.push({ key: "sep7", separator: true });

        rows.push({ key: "capex", label: "CAPEX (abaixo da linha)", level: 0, collapsible: true, getValue: function(d) { return d.capex; }, inverted: true, sparkKey: "capex" });
        var allCapex = {};
        displayPeriods.forEach(function(p) { var d = dreByPeriod[p]; if (d) Object.keys(d.capexDetail).forEach(function(k) { allCapex[k] = true; }); });
        Object.keys(allCapex).sort().forEach(function(k) {
          rows.push({ key: "capex_" + k, label: k, level: 2, parent: "capex", getValue: function(d) { return d.capexDetail[k] || 0; }, inverted: true });
        });

        rows.push({ key: "comprasExtras", label: "Extras (equipamentos)", level: 0, getValue: function(d) { return d.comprasExtras || 0; }, inverted: true, sparkKey: "comprasExtras" });

        return rows;
      }, [dreByPeriod, displayPeriods]);

      var visibleRows = useMemo(function() {
        return dreRows.filter(function(row) {
          if (row.separator || row.highlight || row.collapsible) return true;
          if (row.parent && collapsed[row.parent]) return false;
          if (row.level >= 2 && row.getValue) {
            var allZero = displayPeriods.every(function(p) {
              var d = dreByPeriod[p];
              return !d || Math.abs(row.getValue(d)) < 0.01;
            });
            if (allZero) return false;
          }
          return true;
        });
      }, [dreRows, collapsed, displayPeriods, dreByPeriod]);

      // ═══════════════════════════════════════════════════════
      // RENDER: UPLOAD SCREEN
      // ═══════════════════════════════════════════════════════
      if (!processed) {
        return (
          <div style={{ fontFamily: "Poppins, sans-serif", background: COLORS.bg, minHeight: "100vh" }}>
            <div style={{ height: 4, background: "linear-gradient(90deg, " + COLORS.cream + ", " + COLORS.amber + ", " + COLORS.orange + ", " + COLORS.red + ")" }} />
            <div style={{ maxWidth: 900, margin: "0 auto", padding: "40px 20px" }}>
              <div style={{ textAlign: "center", marginBottom: 40 }}>
                <h1 style={{ color: COLORS.navy, fontSize: 32, fontWeight: 700, margin: 0 }}>
                  {"DRE Petí"}
                </h1>
                <p style={{ color: "#666", fontSize: 14, marginTop: 8 }}>
                  {"Demonstração do Resultado do Exercício"}
                </p>
              </div>

              <div
                onDragOver={function(e) { e.preventDefault(); setDragOver(true); }}
                onDragLeave={function() { setDragOver(false); }}
                onDrop={handleDrop}
                onClick={function() { if (fileInputRef.current) fileInputRef.current.click(); }}
                style={{
                  border: "2px dashed " + (dragOver ? COLORS.orange : "#ccc"),
                  borderRadius: 12, padding: "48px 20px", textAlign: "center",
                  cursor: "pointer",
                  background: dragOver ? COLORS.cream + "33" : "#fff",
                  transition: "all 0.2s", marginBottom: 24,
                }}
              >
                <Upload size={48} color={COLORS.orange} style={{ marginBottom: 16 }} />
                <p style={{ color: COLORS.navy, fontSize: 16, fontWeight: 600, margin: 0 }}>
                  {"Arraste os arquivos Excel aqui"}
                </p>
                <p style={{ color: "#999", fontSize: 13, marginTop: 8 }}>
                  {"ou clique para selecionar"}
                </p>
                <p style={{ background: COLORS.navy + "0a", borderRadius: 8, padding: "8px 16px", display: "inline-block", marginTop: 16, fontSize: 12, color: "#666" }}>
                  {"Padrão: "}<code style={{ color: COLORS.orange }}>{"YYYY-MM_TIPO_Filial.xlsx"}</code>{" ou "}<code style={{ color: COLORS.orange }}>{"YYYY_DESP_Filial.xlsx"}</code>{" (agregado)"}
                </p>
                <input
                  ref={fileInputRef}
                  type="file"
                  multiple
                  accept=".xlsx"
                  style={{ display: "none" }}
                  onChange={function(e) { if (e.target.files) handleFiles(e.target.files); }}
                />
              </div>

              {window.showDirectoryPicker && (
                <div style={{ textAlign: "center", marginBottom: 24 }}>
                  <button
                    onClick={handleFolder}
                    style={{
                      padding: "10px 24px", borderRadius: 8, border: "1px solid " + COLORS.navy,
                      background: "#fff", color: COLORS.navy, fontSize: 13, fontWeight: 600,
                      cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 8,
                      fontFamily: "Poppins, sans-serif",
                    }}
                  >
                    <FolderOpen size={18} /> {"Carregar pasta inteira"}
                  </button>
                  <p style={{ color: "#999", fontSize: 11, marginTop: 6 }}>
                    {"Seleciona uma pasta e importa todos os .xlsx automaticamente"}
                  </p>
                </div>
              )}

              {rawFiles.length > 0 && (
                <div style={{ background: "#fff", borderRadius: 12, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.08)", marginBottom: 24 }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ background: COLORS.navy, color: "#fff" }}>
                        <th style={{ padding: "10px 12px", textAlign: "left" }}>{"Arquivo"}</th>
                        <th style={{ padding: "10px 12px", textAlign: "left" }}>{"Período"}</th>
                        <th style={{ padding: "10px 12px", textAlign: "left" }}>{"Tipo"}</th>
                        <th style={{ padding: "10px 12px", textAlign: "left" }}>{"Filial"}</th>
                        <th style={{ padding: "10px 12px", textAlign: "center" }}>{"Status"}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {rawFiles.map(function(f, i) {
                        var displayType = f.type === "DESP_DBM" ? "DESP" : f.type;
                        var typeBg = (displayType === "DESP") ? "#e8e0f0" : displayType === "FAT" ? "#d0eae6" : displayType === "FATVM" ? "#e0e0ff" : "#fde8d0";
                        var typeColor = (displayType === "DESP") ? "#6b4c9a" : displayType === "FAT" ? COLORS.teal : displayType === "FATVM" ? "#6366f1" : COLORS.orange;
                        return (
                          <tr key={i} style={{ borderBottom: "1px solid #eee", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                            <td style={{ padding: "8px 12px", fontFamily: "monospace", fontSize: 12 }}>{String(f.name)}</td>
                            <td style={{ padding: "8px 12px" }}>{f.displayInfo ? String(f.displayInfo) : f.period ? String(f.period) : "—"}</td>
                            <td style={{ padding: "8px 12px" }}>
                              {displayType ? (
                                <span style={{ background: typeBg, color: typeColor, padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600 }}>
                                  {String(displayType)}{f.type === "DESP_DBM" ? " (agregado)" : ""}
                                </span>
                              ) : null}
                            </td>
                            <td style={{ padding: "8px 12px" }}>{f.branch ? String(f.branch) : "—"}</td>
                            <td style={{ padding: "8px 12px", textAlign: "center" }}>
                              {f.status === "ok" ? (
                                <Check size={16} color={COLORS.teal} />
                              ) : (
                                <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                                  <AlertTriangle size={14} color={COLORS.red} />
                                  <span style={{ color: COLORS.red, fontSize: 11 }}>{String(f.error || "Erro")}</span>
                                </span>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {rawFiles.length > 0 && (
                <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
                  <button
                    onClick={function() { if (fileInputRef.current) fileInputRef.current.click(); }}
                    style={{
                      padding: "10px 24px", borderRadius: 8, border: "1px solid " + COLORS.orange,
                      background: "#fff", color: COLORS.orange, fontSize: 14, fontWeight: 600,
                      cursor: "pointer", display: "flex", alignItems: "center", gap: 8,
                      fontFamily: "Poppins, sans-serif",
                    }}
                  >
                    <Plus size={16} /> {"Adicionar mais"}
                  </button>
                  <button
                    onClick={processAllFiles}
                    disabled={!rawFiles.some(function(f) { return f.status === "ok"; })}
                    style={{
                      padding: "10px 32px", borderRadius: 8, border: "none",
                      background: rawFiles.some(function(f) { return f.status === "ok"; }) ? COLORS.orange : "#ccc",
                      color: "#fff", fontSize: 14, fontWeight: 600,
                      cursor: rawFiles.some(function(f) { return f.status === "ok"; }) ? "pointer" : "not-allowed",
                      display: "flex", alignItems: "center", gap: 8,
                      fontFamily: "Poppins, sans-serif",
                    }}
                  >
                    {"Montar DRE"}
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════
      // RENDER: DASHBOARD
      // ═══════════════════════════════════════════════════════
      function renderDashboard() {
        if (displayPeriods.length === 0) return <div style={{ padding: 40, textAlign: "center", color: "#999" }}>{"Selecione ao menos um período"}</div>;

        // Soma acumulada de todos os períodos selecionados
        var sumDre = { receitaBruta: 0, lucroBruto: 0, ebitda: 0, lucroLiquido: 0, cmv: 0, compras: 0, perda: 0 };
        var hasSome = false;
        displayPeriods.forEach(function(p) {
          var d = dreByPeriod[p];
          if (!d) return;
          hasSome = true;
          sumDre.receitaBruta += d.receitaBruta || 0;
          sumDre.lucroBruto += d.lucroBruto || 0;
          sumDre.ebitda += d.ebitda || 0;
          sumDre.lucroLiquido += d.lucroLiquido || 0;
          sumDre.cmv += d.cmv || 0;
          sumDre.compras += d.compras || 0;
          sumDre.perda += d.perda || 0;
        });

        if (!hasSome) return <div style={{ padding: 40, textAlign: "center", color: "#999" }}>{"Sem dados"}</div>;

        var margemBruta = sumDre.receitaBruta ? sumDre.lucroBruto / sumDre.receitaBruta : 0;
        var pctLL = sumDre.receitaBruta ? sumDre.lucroLiquido / sumDre.receitaBruta : 0;
        var pctEBITDA = sumDre.receitaBruta ? sumDre.ebitda / sumDre.receitaBruta : 0;
        var margemCMV = sumDre.receitaBruta ? 1 - (sumDre.cmv / sumDre.receitaBruta) : 0;
        var pctPerda = sumDre.receitaBruta ? sumDre.perda / sumDre.receitaBruta : 0;

        var periodLabel2 = displayPeriods.length === 1
          ? (grouping === "mensal" ? periodLabel(displayPeriods[0]) : grouping === "trimestral" ? quarterLabel(displayPeriods[0]) : grouping === "semestral" ? semesterLabel(displayPeriods[0]) : String(displayPeriods[0]))
          : displayPeriods.length + " per\u00edodos";

        var cards = [
          { title: "Receita Bruta", value: fmtBRL(sumDre.receitaBruta), sub: periodLabel2, bg: COLORS.navy, color: "#fff" },
          { title: "Lucro L\u00edquido", value: fmtBRL(sumDre.lucroLiquido), sub: fmtPct(pctLL) + " da RB", bg: sumDre.lucroLiquido >= 0 ? COLORS.teal : COLORS.red, color: "#fff" },
          { title: "EBITDA", value: fmtBRL(sumDre.ebitda), sub: fmtPct(pctEBITDA) + " da RB", bg: sumDre.ebitda >= 0 ? COLORS.teal : COLORS.red, color: "#fff" },
          { title: "Margem Bruta", value: fmtPct(margemBruta), sub: fmtBRL(sumDre.lucroBruto), bg: COLORS.amber, color: COLORS.navy },
          { title: "Margem CMV", value: fmtPct(margemCMV), sub: "CMV: " + fmtBRL(sumDre.cmv), bg: "#fff", color: COLORS.navy, border: true },
          { title: "Perda", value: fmtBRL(sumDre.perda), sub: fmtPct(pctPerda) + " da RB", bg: Math.abs(sumDre.perda) > sumDre.receitaBruta * 0.03 ? COLORS.red : "#fff", color: Math.abs(sumDre.perda) > sumDre.receitaBruta * 0.03 ? "#fff" : COLORS.navy, border: Math.abs(sumDre.perda) <= sumDre.receitaBruta * 0.03 },
        ];

        var chartData = displayPeriods.map(function(p) {
          var d = dreByPeriod[p];
          return {
            name: grouping === "mensal" ? periodLabel(p) : grouping === "trimestral" ? quarterLabel(p) : grouping === "semestral" ? semesterLabel(p) : String(p),
            receitaBruta: d ? d.receitaBruta : 0,
            lucroBruto: d ? d.lucroBruto : 0,
            ebitda: d ? d.ebitda : 0,
            lucroLiquido: d ? d.lucroLiquido : 0,
          };
        });

        return (
          <div style={{ padding: "20px 24px" }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 14, marginBottom: 32 }}>
              {cards.map(function(c, i) {
                return (
                  <div key={i} style={{ background: c.bg, color: c.color, borderRadius: 12, padding: "18px 16px 14px", boxShadow: "0 2px 8px rgba(0,0,0,0.12)", border: c.border ? "1px solid #e0e0e0" : "none" }}>
                    <div style={{ fontSize: 12, opacity: 0.8, fontWeight: 500, marginBottom: 4 }}>{String(c.title)}</div>
                    <div style={{ fontSize: 26, fontWeight: 700, lineHeight: 1.2 }}>{String(c.value)}</div>
                    <div style={{ fontSize: 12, opacity: 0.7, marginTop: 6 }}>{String(c.sub)}</div>
                  </div>
                );
              })}
            </div>

            {displayPeriods.length >= 2 && (
              <div style={{ background: "#fff", borderRadius: 12, padding: 24, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                <h3 style={{ color: COLORS.navy, fontSize: 16, fontWeight: 600, margin: "0 0 20px 0" }}>
                  {"Evolução dos Indicadores"}
                </h3>
                <ResponsiveContainer width="100%" height={340}>
                  <LineChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                    <XAxis dataKey="name" tick={{ fontSize: 11, fill: "#666" }} />
                    <YAxis tickFormatter={function(v) { return fmtBRL(v); }} tick={{ fontSize: 10, fill: "#666" }} width={100} />
                    <RechartsTooltip
                      formatter={function(value, name) {
                        var labels = { receitaBruta: "Receita Bruta", lucroBruto: "Lucro Bruto", ebitda: "EBITDA", lucroLiquido: "Lucro Líquido" };
                        return [fmtBRL(value), labels[name] || String(name)];
                      }}
                      contentStyle={{ borderRadius: 8, border: "none", boxShadow: "0 2px 8px rgba(0,0,0,0.12)", fontSize: 12 }}
                    />
                    <Legend iconType="circle" wrapperStyle={{ fontSize: 12 }} formatter={function(v) {
                      var labels = { receitaBruta: "Receita Bruta", lucroBruto: "Lucro Bruto", ebitda: "EBITDA", lucroLiquido: "Lucro Líquido" };
                      return labels[v] || String(v);
                    }} />
                    <ReferenceLine y={0} stroke="#555" strokeWidth={0.8} />
                    <Line type="monotone" dataKey="receitaBruta" stroke={COLORS.navy} strokeWidth={2.5} dot={{ r: 3 }} />
                    <Line type="monotone" dataKey="lucroBruto" stroke={COLORS.amber} strokeWidth={2} dot={{ r: 3 }} />
                    <Line type="monotone" dataKey="ebitda" stroke={COLORS.orange} strokeWidth={2} dot={{ r: 3 }} />
                    <Line type="monotone" dataKey="lucroLiquido" stroke={COLORS.teal} strokeWidth={2} dot={{ r: 3 }} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            )}

            {displayPeriods.length >= 2 && (
              <div style={{ background: "#fff", borderRadius: 12, padding: 24, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginTop: 20 }}>
                <h3 style={{ color: COLORS.navy, fontSize: 16, fontWeight: 600, margin: "0 0 20px 0" }}>
                  {"Comparativo por Período"}
                </h3>
                <ResponsiveContainer width="100%" height={280}>
                  <BarChart data={chartData} margin={{ top: 5, right: 20, left: 20, bottom: 5 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                    <XAxis dataKey="name" tick={{ fontSize: 11, fill: "#666" }} />
                    <YAxis tickFormatter={function(v) { return fmtBRL(v); }} tick={{ fontSize: 10, fill: "#666" }} width={100} />
                    <RechartsTooltip
                      formatter={function(value, name) {
                        var labels = { receitaBruta: "Receita Bruta", lucroLiquido: "Lucro Líquido", ebitda: "EBITDA" };
                        return [fmtBRL(value), labels[name] || String(name)];
                      }}
                      contentStyle={{ borderRadius: 8, border: "none", boxShadow: "0 2px 8px rgba(0,0,0,0.12)", fontSize: 12 }}
                    />
                    <ReferenceLine y={0} stroke="#555" strokeWidth={0.8} />
                    <Bar dataKey="receitaBruta" name="Receita Bruta" fill={COLORS.navy} radius={[4, 4, 0, 0]} />
                    <Bar dataKey="ebitda" name="EBITDA" fill={COLORS.orange} radius={[4, 4, 0, 0]} />
                    <Bar dataKey="lucroLiquido" name="Lucro Líquido" radius={[4, 4, 0, 0]}>
                      {chartData.map(function(entry, idx) {
                        return <Cell key={idx} fill={entry.lucroLiquido >= 0 ? COLORS.teal : COLORS.red} />;
                      })}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            )}
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════
      // RENDER: DRE TABLE
      // ═══════════════════════════════════════════════════════
      function renderDRETable() {
        if (displayPeriods.length === 0) return <div style={{ padding: 40, textAlign: "center", color: "#999" }}>{"Selecione ao menos um período"}</div>;

        return (
          <div style={{ display: "flex", gap: 0 }}>
          <div style={{ flex: 1, padding: "12px 16px", minWidth: 0 }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12, flexWrap: "wrap" }}>
              <button onClick={function() { setShowDreNotes(!showDreNotes); }}
                style={{ padding: "4px 10px", borderRadius: 5, border: "1px solid " + (showDreNotes ? COLORS.teal : "#ddd"), background: showDreNotes ? COLORS.teal + "15" : "#fff", color: showDreNotes ? COLORS.teal : "#888", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "Poppins", display: "flex", alignItems: "center", gap: 4 }}>
{"\u270e Observa\u00e7\u00f5es"}
              </button>
              <SegmentedButton
                options={[{ value: "brl", label: "R$" }, { value: "pct", label: "% RB" }, { value: "both", label: "R$ + %" }]}
                selected={valueMode}
                onChange={setValueMode}
              />
              <ToggleBtn label={"Δ Variação"} active={showDelta} onClick={function() { setShowDelta(!showDelta); }} />
              <ToggleBtn label="Heatmap" active={showHeatmap} onClick={function() { setShowHeatmap(!showHeatmap); }} />
              <button onClick={expandAll} style={smallBtnStyle}>{"Expandir tudo"}</button>
              <button onClick={collapseAll} style={smallBtnStyle}>{"Colapsar tudo"}</button>
            </div>

            <div style={{ overflowX: "auto", borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, background: "#fff" }}>
                <thead>
                  <tr style={{ background: COLORS.navy, color: "#fff" }}>
                    <th style={{ padding: "8px 12px", textAlign: "left", position: "sticky", left: 0, background: COLORS.navy, zIndex: 11, minWidth: 260 }}>
                      {"Conta"}
                    </th>
                    {displayPeriods.map(function(p, i) {
                      var label = grouping === "mensal" ? periodLabel(p) : grouping === "trimestral" ? quarterLabel(p) : grouping === "semestral" ? semesterLabel(p) : String(p);
                      var cols = [
                        <th key={"h_" + p} style={{ padding: "8px 10px", textAlign: "right", minWidth: valueMode === "both" ? 160 : 110, whiteSpace: "nowrap" }}>
                          {label}
                        </th>
                      ];
                      if (showDelta && i > 0) {
                        cols.push(
                          <th key={"hd_" + p} style={{ padding: "4px 6px", textAlign: "center", minWidth: 56, fontSize: 10, opacity: 0.8 }}>
                            {"Δ%"}
                          </th>
                        );
                      }
                      return cols;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {visibleRows.map(function(row, ri) {
                    if (row.separator) {
                      return (
                        <tr key={row.key}>
                          <td colSpan={100} style={{ height: 3, background: "linear-gradient(90deg, " + COLORS.cream + ", " + COLORS.amber + ", " + COLORS.orange + ", " + COLORS.red + ")" }} />
                        </tr>
                      );
                    }

                    var isCollapsible = row.collapsible;
                    var isCollapsedRow = collapsed[row.key];
                    var values = displayPeriods.map(function(p) { return dreByPeriod[p] ? row.getValue(dreByPeriod[p]) : null; });
                    var sparkValues = row.sparkKey ? periods.map(function(p) {
                      var d = allMonthsDre[p];
                      if (!d) return null;
                      if (row.sparkKey === "receitaBruta") return d.receitaBruta;
                      if (row.sparkKey === "receitaLiquida") return d.receitaLiquida;
                      if (row.sparkKey === "cmv") return d.cmv;
                      if (row.sparkKey === "compras") return d.compras;
                      if (row.sparkKey === "perda") return d.perda;
                      if (row.sparkKey === "lucroBruto") return d.lucroBruto;
                      if (row.sparkKey === "totalOpex") return d.totalOpex;
                      if (row.sparkKey === "ebitda") return d.ebitda;
                      if (row.sparkKey === "juros") return d.juros;

      function updateBudgetCell(branch, month, lineKey, value) {
        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          if (next.branches[branch] && next.branches[branch].months[month]) {
            next.branches[branch].months[month][lineKey] = value;
          }
          return next;
        });
      }

      function addBudgetBranch(name, type) {
        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          if (!next.branches[name]) {
            next.branches[name] = emptyBudgetBranch(type);
          }
          return next;
        });
        setBudgetBranch(name);
        setSelectedBudgetBranches(function(prev) {
          return prev.indexOf(name) >= 0 ? prev : prev.concat([name]);
        });
      }

      function removeBudgetBranch(name) {
        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          delete next.branches[name];
          return next;
        });
        setSelectedBudgetBranches(function(prev) { return prev.filter(function(b) { return b !== name; }); });
        setBudgetBranch(function(prev) { return prev === name ? Object.keys(budget.branches).find(function(b) { return b !== name; }) || null : prev; });
      }

      function importBaselineForBranch(branchName) {
        if (!parsedData[branchName]) return;
        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          if (!next.branches[branchName]) next.branches[branchName] = emptyBudgetBranch("operacional");
          var bd = parsedData[branchName];
          Object.keys(bd).forEach(function(period) {
            var parts = period.split("-");
            var mm = parts[1];
            if (!next.branches[branchName].months[mm]) return;
            var raw = getConsolidated(period); // uses single-branch? no — we need raw per-branch
            var d = bd[period];
            // FAT data → receita
            if (d.fat) {
              next.branches[branchName].months[mm].receita = d.fat.venda || 0;
            }
            // COM data → compras (excluindo EXTRAS = equipamentos)
            if (d.com) {
              var extrasVal = 0;
              if (d.com.categories) {
                d.com.categories.forEach(function(cat) {
                  if (/^EXTRAS$/i.test(String(cat.nome || "").trim())) extrasVal += cat.compraLiq || 0;
                });
              }
              next.branches[branchName].months[mm].compras = (d.com.totalCompraLiq || 0) - extrasVal;
            }
            // DESP data → groups
            if (d.desp) {
              Object.keys(d.desp).forEach(function(code) {
                var paddedCode = code.length === 1 ? "0" + code : code;
                var lineKey = "g_" + paddedCode;
                var total = 0;
                Object.keys(d.desp[code].items).forEach(function(item) {
                  total += d.desp[code].items[item];
                });
                next.branches[branchName].months[mm][lineKey] = total;
              });
            }
          });
          return next;
        });
      }

      function fillFromHistory(branchName) {
        if (!parsedData[branchName]) return;
        var periods = Object.keys(parsedData[branchName]).sort();
        var last3Periods = periods.slice(-3);
        if (last3Periods.length === 0) return;

        setBudget(function(prev) {
          var next = JSON.parse(JSON.stringify(prev));
          if (!next.branches[branchName]) next.branches[branchName] = emptyBudgetBranch("operacional");

          BUDGET_LINES.forEach(function(line) {
            var lineKey = line.key;
            var values = [];
            last3Periods.forEach(function(period) {
              var parts = period.split("-");
              var mm = parts[1];
              var d = parsedData[branchName][period];
              var val = 0;
              if (lineKey === "receita" && d.fat) {
                val = d.fat.venda || 0;
              } else if (lineKey === "compras" && d.com) {
                var extVal = 0;
                if (d.com.categories) { d.com.categories.forEach(function(cat) { if (/^EXTRAS$/i.test(String(cat.nome || "").trim())) extVal += cat.compraLiq || 0; }); }
                val = (d.com.totalCompraLiq || 0) - extVal;
              } else if (lineKey.indexOf("g_") === 0 && d.desp) {
                var code = lineKey.substring(2);
                if (code.length === 2 && code[0] === "0") {
                  code = code.substring(1);
                }
                if (d.desp[code]) {
                  var total = 0;
                  Object.keys(d.desp[code].items).forEach(function(item) {
                    total += d.desp[code].items[item];
                  });
                  val = total;
                } else if (d.desp["0" + code]) {
                  var total = 0;
                  Object.keys(d.desp["0" + code].items).forEach(function(item) {
                    total += d.desp["0" + code].items[item];
                  });
                  val = total;
                }
              }
              values.push(val);
            });

            if (values.length > 0) {
              var avg = values.reduce(function(a, b) { return a + b; }, 0) / values.length;
              for (var mi = 1; mi <= 12; mi++) {
                var mm = ("0" + mi).slice(-2);
                next.branches[branchName].months[mm][lineKey] = avg;
              }
            }
          });
          return next;
        });
      }

      // Compute rateio allocation for a given month
      function computeRateio(month) {
        var backBranch = budget.branches["BACKOFFICE"];
        if (!backBranch) return {};
        var backMonth = backBranch.months[month] || emptyBudgetMonth();
        var totalBack = 0;
        BUDGET_LINES.forEach(function(l) {
          if (l.type === "expense") totalBack += (backMonth[l.key] || 0);
        });

        var operBranches = Object.keys(budget.branches).filter(function(b) {
          return budget.branches[b].type !== "backoffice" && selectedBudgetBranches.indexOf(b) >= 0;
        });

        var alloc = {};
        if (budget.rateio.method === "fixo") {
          operBranches.forEach(function(b) {
            var pct = (budget.rateio.fixed[b] || 0) / 100;
            alloc[b] = totalBack * pct;
          });
        } else {
          // Proporcional à receita orçada
          var totalRev = 0;
          operBranches.forEach(function(b) {
            totalRev += (budget.branches[b].months[month] || {}).receita || 0;
          });
          operBranches.forEach(function(b) {
            var rev = (budget.branches[b].months[month] || {}).receita || 0;
            alloc[b] = totalRev > 0 ? totalBack * (rev / totalRev) : 0;
          });
        }
        return alloc;
      }

      // Compute budget DRE for a branch+month (with optional rateio)
      function computeBudgetDRE(branchName, month, includeRateio) {
        var bd = budget.branches[branchName];
        if (!bd) return null;
        var m = bd.months[month] || emptyBudgetMonth();
        var receita = m.receita || 0;
        var compras = m.compras || 0;

        var impostosReceita = 0, opex = 0, juros = 0, impostosParcelados = 0, impostosLucro = 0, sociedade = 0, capex = 0;
        BUDGET_LINES.forEach(function(l) {
          if (!l.section) return;
          var v = m[l.key] || 0;
          if (l.section === "impostos_receita") impostosReceita += v;
          else if (l.section === "opex") opex += v;
          else if (l.section === "juros") juros += v;
          else if (l.section === "impostos_parcelados") impostosParcelados += v;
          else if (l.section === "impostos_lucro") impostosLucro += v;
          else if (l.section === "sociedade") sociedade += v;
          else if (l.section === "capex") capex += v;
        });

        var rateioValue = 0;
        if (includeRateio && bd.type !== "backoffice") {
          var alloc = computeRateio(month);
          rateioValue = alloc[branchName] || 0;
        }

        var receitaLiquida = receita - impostosReceita;
        var lucroBruto = receitaLiquida - compras;
        var ebitda = lucroBruto - opex;
        var lucroLiquido = ebitda - juros - impostosParcelados - impostosLucro - sociedade - rateioValue;

        return {
          receita: receita, impostosReceita: impostosReceita, receitaLiquida: receitaLiquida,
          compras: compras, lucroBruto: lucroBruto, opex: opex, ebitda: ebitda,
          juros: juros, impostosParcelados: impostosParcelados, impostosLucro: impostosLucro,
          sociedade: sociedade, rateio: rateioValue, lucroLiquido: lucroLiquido, capex: capex,
        };
      }

      // Excel export/import
      function exportBudgetXLSX() {
        var workbook = XLSX.utils.book_new();
        var budgetBranches = Object.keys(budget.branches).sort();

        budgetBranches.forEach(function(branchName) {
          var bd = budget.branches[branchName];
          var aoa = [];

          var headerRow = ["Linha"];
          MONTHS_LABELS.forEach(function(m) { headerRow.push(m); });
          headerRow.push("Total");
          aoa.push(headerRow);

          var lineTotal = {};
          BUDGET_LINES.forEach(function(l) { lineTotal[l.key] = 0; });

          BUDGET_LINES.forEach(function(line) {
            var row = [line.label];
            var total = 0;
            for (var mi = 1; mi <= 12; mi++) {
              var mm = ("0" + mi).slice(-2);
              var val = (bd.months[mm] || {})[line.key] || 0;
              row.push(val);
              total += val;
            }
            row.push(total);
            aoa.push(row);
          });

          var sheet = XLSX.utils.aoa_to_sheet(aoa);
          sheet["!cols"] = [{ wch: 25 }];
          for (var i = 1; i <= 13; i++) {
            if (!sheet["!cols"]) sheet["!cols"] = [];
            sheet["!cols"].push({ wch: 12 });
          }

          XLSX.utils.book_append_sheet(workbook, sheet, branchName);
        });

        XLSX.writeFile(workbook, "orcamento_" + budget.year + ".xlsx");
      }

      function importBudgetXLSX(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = new Uint8Array(e.target.result);
            var workbook = XLSX.read(data, { type: "array" });
            var newBudget = JSON.parse(JSON.stringify(budget));

            workbook.SheetNames.forEach(function(sheetName) {
              var sheet = workbook.Sheets[sheetName];
              var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

              if (rows.length < 2) return;

              var branchName = sheetName;
              if (!newBudget.branches[branchName]) {
                newBudget.branches[branchName] = emptyBudgetBranch("operacional");
              }

              for (var ri = 1; ri < rows.length; ri++) {
                var row = rows[ri];
                if (!row || !row[0]) continue;

                var lineLabel = String(row[0]).trim();
                var matchingLine = BUDGET_LINES.find(function(l) { return l.label === lineLabel; });

                var lineKey = matchingLine.key;
                for (var mi = 1; mi <= 12; mi++) {
                  var mm = ("0" + mi).slice(-2);
                  var cellVal = row[mi];
                  var numVal = cellVal != null ? parseFloat(String(cellVal).replace(/[^\d.-]/g, "")) : 0;
                  numVal = isNaN(numVal) ? 0 : numVal;
                  newBudget.branches[branchName].months[mm][lineKey] = numVal;
                }
              }
            });

            setBudget(newBudget);
            alert("Orçamento importado com sucesso!");
          } catch(err) { alert("Erro ao ler arquivo: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
