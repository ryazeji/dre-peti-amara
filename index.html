                    {"O custo do backoffice será distribuído proporcionalmente à receita orçada de cada filial em cada mês."}
                  </p>
                )}

                {budget.rateio.method === "fixo" && (
                  <div>
                    {ops.map(function(b) {
                      return (
                        <div key={b} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                          <span style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{b}</span>
                          <input
                            style={{ width: 60, padding: "6px 8px", borderRadius: 6, border: "1px solid #ddd", textAlign: "right", fontSize: 13 }}
                            defaultValue={budget.rateio.fixed[b] || 0}
                            onBlur={function(e) {
                              var v = parseFloat(e.target.value) || 0;
                              setBudget(function(prev) {
                                var next = JSON.parse(JSON.stringify(prev));
                                next.rateio.fixed[b] = v;
                                return next;
                              });
                            }}
                          />
                          <span style={{ fontSize: 12, color: "#999" }}>{"%"}</span>
                        </div>
                      );
                    })}
                    <div style={{ marginTop: 8, fontSize: 12, color: totalFixed === 100 ? COLORS.teal : COLORS.red, fontWeight: 600 }}>
                      {"Total: " + totalFixed.toFixed(1) + "%" + (totalFixed !== 100 ? " (deve somar 100%)" : " ✓")}
                    </div>
                  </div>
                )}

                <div style={{ marginTop: 20, display: "flex", justifyContent: "flex-end" }}>
                  <button onClick={function() { setShowRateioConfig(false); }} style={{
                    padding: "8px 20px", borderRadius: 6, border: "none", background: COLORS.navy, color: "#fff",
                    fontSize: 13, cursor: "pointer", fontFamily: "Poppins, sans-serif", fontWeight: 600,
                  }}>{"Fechar"}</button>
                </div>
              </div>
            </div>
          );
        }

        // ─── ADD BRANCH MODAL ────────────────────────────────
        function renderAddBranchModal() {
          if (!showAddBranch) return null;
          var nameRef = React.createRef();
          return (
            <div style={{
              position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
              background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999
            }} onClick={function(e) { if (e.target === e.currentTarget) setShowAddBranch(false); }}>
              <div style={{ background: "#fff", borderRadius: 12, padding: 32, width: 380 }}>
                <h3 style={{ margin: "0 0 16px", fontSize: 16, color: COLORS.navy }}>{"Nova Filial"}</h3>
                <input
                  ref={nameRef}
                  style={{ width: "100%", padding: "10px 12px", borderRadius: 6, border: "1px solid #ddd", fontSize: 14, boxSizing: "border-box", marginBottom: 16 }}
                  placeholder="Nome da filial"
                  autoFocus
                />
                <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                  <button onClick={function() { setShowAddBranch(false); }} style={{
                    padding: "8px 16px", borderRadius: 6, border: "1px solid #ddd", background: "#fff",
                    color: "#666", fontSize: 13, cursor: "pointer",
                  }}>{"Cancelar"}</button>
                  <button onClick={function() {
                    var name = nameRef.current ? nameRef.current.value.trim().toUpperCase() : "";
                    if (name) { addBudgetBranch(name, "simulacao"); setShowAddBranch(false); }
                  }} style={{
                    padding: "8px 16px", borderRadius: 6, border: "none", background: COLORS.teal,
                    color: "#fff", fontSize: 13, cursor: "pointer", fontWeight: 600,
                  }}>{"Criar"}</button>
                </div>
              </div>
            </div>
          );
        }

        // ─── MAIN ORÇAMENTO LAYOUT ───────────────────────────
        var budgetXlsxRef = React.createRef();

        return (
          <div style={{ padding: "20px 24px" }}>
            {renderRateioModal()}
            {renderAddBranchModal()}

            {/* Header toolbar */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center", marginBottom: 16 }}>
              <h2 style={{ margin: 0, fontSize: 16, color: COLORS.navy, marginRight: 8 }}>{"Orçamento " + budget.year}</h2>

              <SegmentedButton
                options={[{ value: "editor", label: "Editor" }, { value: "bva", label: "Orçado vs Real" }]}
                selected={budgetView}
                onChange={setBudgetView}
              />

              <div style={{ width: 1, height: 28, background: "#e0e0e0" }} />

              <button onClick={function() { setShowRateioConfig(true); }} style={headerBtnStyle}>
                <Settings size={13} /> {"Rateio"}
              </button>
              <button onClick={function() { setShowAddBranch(true); }} style={headerBtnStyle}>
                <Plus size={13} /> {"Nova filial"}
              </button>

              {budgetBranch && parsedData[budgetBranch] && (
                <button onClick={function() { importBaselineForBranch(budgetBranch); }} style={Object.assign({}, headerBtnStyle, { color: COLORS.teal, borderColor: COLORS.teal })}>
                  <Download size={13} /> {"Importar realizado"}
                </button>
              )}

              {budgetBranch && parsedData[budgetBranch] && (
                <button onClick={function() { fillFromHistory(budgetBranch); }} style={Object.assign({}, headerBtnStyle, { color: COLORS.orange, borderColor: COLORS.orange })}>
                  {"Preencher com Histórico"}
                </button>
              )}

              <div style={{ flex: 1 }} />

              <button onClick={exportBudgetXLSX} style={Object.assign({}, headerBtnStyle, { color: COLORS.navy })}>
                <Download size={13} /> {"Exportar Excel"}
              </button>
              <label style={Object.assign({}, headerBtnStyle, { color: COLORS.navy, cursor: "pointer" })}>
                <Upload size={13} /> {"Importar Excel"}
                <input ref={budgetXlsxRef} type="file" accept=".xlsx" style={{ display: "none" }}
                  onChange={function(e) { if (e.target.files[0]) importBudgetXLSX(e.target.files[0]); }}
                />
              </label>
            </div>

            {/* Branch selector */}
            <div style={{ display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap", marginBottom: 12 }}>
              <span style={{ fontSize: 11, color: "#999", marginRight: 4 }}>{"Filiais:"}</span>
              {budgetBranches.map(function(b) {
                var isSelected = selectedBudgetBranches.indexOf(b) >= 0;
                var isEditing = budgetBranch === b;
                var bType = budget.branches[b].type;
                var typeColor = bType === "backoffice" ? COLORS.orange : bType === "simulacao" ? "#9b59b6" : COLORS.navy;
                return (
                  <div key={b} style={{ display: "flex", alignItems: "center", gap: 0 }}>
                    <button
                      onClick={function() {
                        setSelectedBudgetBranches(function(prev) {
                          var idx = prev.indexOf(b);
                          if (idx >= 0) { var n = prev.slice(); n.splice(idx, 1); return n; }
                          return prev.concat([b]);
                        });
                      }}
                      style={{
                        padding: "4px 10px", fontSize: 11, fontWeight: 600,
                        borderRadius: isEditing ? "6px 0 0 6px" : 6,
                        border: "1px solid " + (isSelected ? typeColor : "#ddd"),
                        background: isSelected ? typeColor + "15" : "#fff",
                        color: isSelected ? typeColor : "#999",
                        cursor: "pointer", fontFamily: "Poppins, sans-serif",
                      }}
                    >
                      {b + (bType === "backoffice" ? " (back)" : bType === "simulacao" ? " (sim)" : "")}
                    </button>
                    {budgetView === "editor" && (
                      <button
                        onClick={function() { setBudgetBranch(b); }}
                        style={{
                          padding: "4px 8px", fontSize: 10, borderRadius: "0 6px 6px 0",
                          border: "1px solid " + (isEditing ? COLORS.teal : "#ddd"), borderLeft: "none",
                          background: isEditing ? COLORS.teal : "#f5f5f5",
                          color: isEditing ? "#fff" : "#999",
                          cursor: "pointer", fontWeight: 600,
                        }}
                      >
                        {"Editar"}
                      </button>
                    )}
                    {bType === "simulacao" && (
                      <button
                        onClick={function() { if (confirm("Remover " + b + "?")) removeBudgetBranch(b); }}
                        style={{ padding: "4px 6px", border: "none", background: "transparent", cursor: "pointer", color: "#ccc" }}
                      >
                        <Trash size={12} />
                      </button>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Content */}
            <div style={{ background: "#fff", borderRadius: 12, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
              {budgetView === "editor" ? renderEditor() : renderBVA()}
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════
      // MAIN RENDER
      // ═══════════════════════════════════════════════════════
      // ═══════════════════════════════════════════════════════
      // ─── LOJAS TAB ─────────────────────────────────────────
      // ═══════════════════════════════════════════════════════

      function saveStoreGroups(groups) {
        setStoreGroups(groups);
        try { localStorage.setItem(STORE_GROUPS_KEY, JSON.stringify(groups)); } catch(e) {}
      }

      // ─── LOJAS: collect store data respecting selectedPeriods ───
      var STORE_BLACKLIST = /^(cliente|total)$/i;
      var _storeMap = {};
      var _activePeriods = selectedPeriods.length > 0 ? selectedPeriods : periods;
      Object.keys(parsedData).forEach(function(branch) {
        Object.keys(parsedData[branch]).forEach(function(period) {
          if (_activePeriods.indexOf(period) < 0) return; // respect period filter
          var d = parsedData[branch][period];
          if (!d || !d.fatvm || !d.fatvm.stores) return;
          d.fatvm.stores.forEach(function(s) {
            if (STORE_BLACKLIST.test(String(s.nome || "").trim())) return; // skip headers
            if (!_storeMap[s.nome]) _storeMap[s.nome] = { nome: s.nome, periods: {} };
            _storeMap[s.nome].periods[period] = {
              valor: s.valor, desconto: s.desconto,
              qtdVendas: s.qtdVendas, qtdItens: s.qtdItens,
              ticketMedio: s.qtdVendas > 0 ? s.valor / s.qtdVendas : 0,
              itensPorVenda: s.qtdVendas > 0 ? s.qtdItens / s.qtdVendas : 0
            };
          });
        });
      });
      var allStoreData = Object.values(_storeMap).map(function(st) {
        var pKeys = Object.keys(st.periods).sort();
        var totals = { valor: 0, desconto: 0, qtdVendas: 0, qtdItens: 0 };
        pKeys.forEach(function(p) {
          var d = st.periods[p];
          totals.valor += d.valor; totals.desconto += d.desconto;
          totals.qtdVendas += d.qtdVendas; totals.qtdItens += d.qtdItens;
        });
        totals.ticketMedio = totals.qtdVendas > 0 ? totals.valor / totals.qtdVendas : 0;
        totals.itensPorVenda = totals.qtdVendas > 0 ? totals.qtdItens / totals.qtdVendas : 0;
        return { nome: st.nome, periods: st.periods, totals: totals, periodKeys: pKeys, periodCount: pKeys.length };
      }).sort(function(a, b) { return b.totals.valor - a.totals.valor; });

      // storePeriods (only selected)
      var _pSet = {};
      allStoreData.forEach(function(s) { s.periodKeys.forEach(function(p) { _pSet[p] = true; }); });
      var storePeriods = Object.keys(_pSet).sort();

      // filteredStores: apply excludedStores, search, group, sort
      var filteredStores = allStoreData.filter(function(s) { return excludedStores.indexOf(s.nome) < 0; });
      if (storeSelectedGroup !== "all") {
        var _grp = storeGroups.find(function(g) { return g.name === storeSelectedGroup; });
        if (_grp) { filteredStores = filteredStores.filter(function(s) { return _grp.stores.indexOf(s.nome) >= 0; }); }
      }
      if (storeFilter) {
        var _q = storeFilter.toLowerCase();
        filteredStores = filteredStores.filter(function(s) { return s.nome.toLowerCase().indexOf(_q) >= 0; });
      }
      var _sortParts = storeSort.split("_");
      var _sortField = _sortParts[0];
      var _sortDir = _sortParts[1] === "asc" ? 1 : -1;
      filteredStores.sort(function(a, b) {
        var va = _sortField === "nome" ? a.nome : (a.totals[_sortField] || 0);
        var vb = _sortField === "nome" ? b.nome : (b.totals[_sortField] || 0);
        if (typeof va === "string") return _sortDir * va.localeCompare(vb);
        return _sortDir * (va - vb);
      });

      // paretoData (based on visible stores only)
      var _paretoSource = filteredStores.slice().sort(function(a, b) { return b.totals.valor - a.totals.valor; });
      var _grandTotalP = _paretoSource.reduce(function(s, st) { return s + st.totals.valor; }, 0);
      var _cum = 0;
      var paretoData = _paretoSource.map(function(s, i) {
        _cum += s.totals.valor;
        return { nome: s.nome, valor: s.totals.valor, pct: _grandTotalP > 0 ? s.totals.valor / _grandTotalP : 0, cumPct: _grandTotalP > 0 ? _cum / _grandTotalP : 0, rank: i + 1 };
      });

      function renderLojas() {
        if (allStoreData.length === 0) {
          return (
            <div style={{ padding: 60, textAlign: "center", color: "#999" }}>
              <Store size={48} color="#ccc" />
              <p style={{ marginTop: 16, fontSize: 16 }}>{"Nenhum dado de lojas dispon\u00edvel."}</p>
              <p style={{ fontSize: 13, marginTop: 4 }}>{"Fa\u00e7a upload de arquivos FATvm para visualizar dados por loja."}</p>
            </div>
          );
        }

        // KPIs based on VISIBLE (filtered) stores
        var grandTotal = filteredStores.reduce(function(s, st) { return s + st.totals.valor; }, 0);
        var grandVendas = filteredStores.reduce(function(s, st) { return s + st.totals.qtdVendas; }, 0);
        var grandItens = filteredStores.reduce(function(s, st) { return s + st.totals.qtdItens; }, 0);
        var grandTicket = grandVendas > 0 ? grandTotal / grandVendas : 0;
        var visibleCount = filteredStores.length;

        var cardStyle = {
          background: "#fff", borderRadius: 10, padding: "10px 14px",
          boxShadow: "0 1px 4px rgba(0,0,0,0.06)", flex: "1 1 140px", minWidth: 130
        };
        var labelStyle = { fontSize: 10, color: "#888", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px" };
        var bigNumStyle = { fontSize: 18, fontWeight: 700, color: COLORS.navy, marginTop: 2 };

        function openNewGroup() {
          setEditGroupIdx(-1); setEditGroupName(""); setEditGroupStores([]); setShowStoreGroupModal(true);
        }
        function openEditGroup(idx) {
          var g = storeGroups[idx];
          setEditGroupIdx(idx); setEditGroupName(g.name); setEditGroupStores(g.stores.slice()); setShowStoreGroupModal(true);
        }
        function saveGroup() {
          if (!editGroupName.trim()) return;
          var newGroups = storeGroups.slice();
          var obj = { name: editGroupName.trim(), stores: editGroupStores };
          if (editGroupIdx >= 0) { newGroups[editGroupIdx] = obj; } else { newGroups.push(obj); }
          saveStoreGroups(newGroups);
          setShowStoreGroupModal(false);
        }
        function deleteGroup(idx) {
          var newGroups = storeGroups.slice();
          newGroups.splice(idx, 1);
          saveStoreGroups(newGroups);
          if (storeSelectedGroup === storeGroups[idx].name) setStoreSelectedGroup("all");
        }
        function toggleGroupStore(nome) {
          setEditGroupStores(function(prev) {
            var idx = prev.indexOf(nome);
            if (idx >= 0) { var n = prev.slice(); n.splice(idx, 1); return n; }
            return prev.concat([nome]);
          });
        }
        function toggleStoreVisibility(nome) {
          setExcludedStores(function(prev) {
            var idx = prev.indexOf(nome);
            if (idx >= 0) { var n = prev.slice(); n.splice(idx, 1); return n; }
            return prev.concat([nome]);
          });
        }

        var sortOptions = [
          { value: "valor_desc", label: "Faturamento \u2193" },
          { value: "valor_asc", label: "Faturamento \u2191" },
          { value: "ticketMedio_desc", label: "Ticket M\u00e9dio \u2193" },
          { value: "ticketMedio_asc", label: "Ticket M\u00e9dio \u2191" },
          { value: "qtdVendas_desc", label: "Qtd Vendas \u2193" },
          { value: "qtdVendas_asc", label: "Qtd Vendas \u2191" },
          { value: "nome_asc", label: "Nome A-Z" },
          { value: "nome_desc", label: "Nome Z-A" },
        ];

        // Sidebar store list sorted by valor desc
        var sidebarStores = allStoreData.slice().sort(function(a, b) { return b.totals.valor - a.totals.valor; });

        // ── Compute ABC summary for donut ──
        var abcSummary = { A: { count: 0, valor: 0 }, B: { count: 0, valor: 0 }, C: { count: 0, valor: 0 } };
        paretoData.forEach(function(p) {
          var cls = p.cumPct <= 0.8 ? "A" : p.cumPct <= 0.95 ? "B" : "C";
          abcSummary[cls].count++; abcSummary[cls].valor += p.valor;
        });
        var donutData = [
          { name: "A", value: abcSummary.A.valor, count: abcSummary.A.count, fill: COLORS.teal },
          { name: "B", value: abcSummary.B.valor, count: abcSummary.B.count, fill: COLORS.amber },
          { name: "C", value: abcSummary.C.valor, count: abcSummary.C.count, fill: "#ccc" }
        ].filter(function(d) { return d.value > 0; });

        // ── Scatter data: ticket x vendas ──
        var scatterData = filteredStores.map(function(st) {
          var pEntry = paretoData.find(function(p) { return p.nome === st.nome; });
          var abc = pEntry ? (pEntry.cumPct <= 0.8 ? "A" : pEntry.cumPct <= 0.95 ? "B" : "C") : "C";
          return { nome: st.nome, x: st.totals.qtdVendas, y: st.totals.ticketMedio, valor: st.totals.valor, abc: abc };
        });

        // ── Top 5 / Bottom 5 ──
        var top5 = filteredStores.slice(0, 5);
        var bottom5 = filteredStores.length > 5 ? filteredStores.slice(-5).reverse() : [];

        // Sidebar stores sorted by valor desc and filtered by search
        var sidebarStores = allStoreData.slice().sort(function(a, b) { return b.totals.valor - a.totals.valor; });
        var filteredSidebar = sidebarStores.filter(function(st) {
          if (!storeFilter) return true;
          return st.nome.toLowerCase().indexOf(storeFilter.toLowerCase()) >= 0;
        });

        return (
          <div style={{ display: "flex", flexDirection: "column", overflowY: "auto", maxHeight: "calc(100vh - 120px)" }}>
            {/* ── TOP SECTION: sidebar + KPIs + Pareto row ── */}
            <div style={{ display: "flex", gap: 0, alignItems: "stretch" }}>
            {/* ── SIDEBAR: store checkboxes in 2 columns ── */}
            <div style={{
              width: 310, minWidth: 310, background: "#fff", borderRight: "1px solid #eee",
              overflowY: "auto", overflowX: "hidden", padding: "10px 0",
              boxShadow: "2px 0 8px rgba(0,0,0,0.03)"
            }}>
              <div style={{ padding: "0 10px 6px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: COLORS.navy, textTransform: "uppercase", letterSpacing: "0.5px" }}>
                  {"Lojas (" + visibleCount + "/" + allStoreData.length + ")"}
                </span>
                <div style={{ display: "flex", gap: 3 }}>
                  <button onClick={function() { setExcludedStores([]); }}
                    style={{ padding: "3px 8px", borderRadius: 4, border: "1px solid " + COLORS.teal, background: excludedStores.length === 0 ? COLORS.teal : "#fff", color: excludedStores.length === 0 ? "#fff" : COLORS.teal, fontSize: 9, fontWeight: 600, cursor: "pointer", fontFamily: "Poppins" }}>
                    {"Todas"}
                  </button>
                  <button onClick={function() { setExcludedStores(allStoreData.map(function(s) { return s.nome; })); }}
                    style={{ padding: "3px 8px", borderRadius: 4, border: "1px solid #ccc", background: "#fff", color: "#888", fontSize: 9, fontWeight: 600, cursor: "pointer", fontFamily: "Poppins" }}>
                    {"Nenhuma"}
                  </button>
                </div>
              </div>
              <div style={{ padding: "0 8px 6px" }}>
                <input type="text" placeholder="Buscar..." value={storeFilter}
                  onChange={function(e) { setStoreFilter(e.target.value); }}
                  style={{ width: "100%", padding: "4px 8px", borderRadius: 5, border: "1px solid #e0e0e0", fontSize: 10, fontFamily: "Poppins", boxSizing: "border-box", outline: "none" }}
                />
              </div>
              {/* 2-column grid */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", padding: "0 4px", gap: 0 }}>
                {filteredSidebar.map(function(st) {
                  var isVisible = excludedStores.indexOf(st.nome) < 0;
                  var pEntry = paretoData.find(function(p) { return p.nome === st.nome; });
                  var abc = pEntry ? (pEntry.cumPct <= 0.8 ? "A" : pEntry.cumPct <= 0.95 ? "B" : "C") : "";
                  var abcCol = abc === "A" ? COLORS.teal : abc === "B" ? COLORS.amber : "#bbb";
                  return (
                    <label key={st.nome} style={{
                      display: "flex", alignItems: "center", gap: 4, padding: "3px 6px",
                      cursor: "pointer", fontSize: 10, borderBottom: "1px solid #f8f8f8",
                      background: isVisible ? "transparent" : "#f9f9f9",
                      opacity: isVisible ? 1 : 0.45
                    }}>
                      <input type="checkbox" checked={isVisible} onChange={function() { toggleStoreVisibility(st.nome); }}
                        style={{ margin: 0, accentColor: COLORS.teal, width: 12, height: 12 }} />
                      <span style={{ fontWeight: isVisible ? 500 : 400, color: isVisible ? COLORS.navy : "#aaa", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 10 }}>
                        {String(st.nome).replace(/^\d+\s*/, "")}
                      </span>
                      <span style={{ fontSize: 8, fontWeight: 700, color: abcCol }}>{abc}</span>
                    </label>
                  );
                })}
              </div>
              {/* Group management */}
              <div style={{ borderTop: "1px solid #eee", marginTop: 6, padding: "8px 10px" }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: "#888", textTransform: "uppercase", marginBottom: 4 }}>{"Grupos"}</div>
                {storeGroups.map(function(g, i) {
                  var isActive = storeSelectedGroup === g.name;
                  return (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 3, marginBottom: 3 }}>
                      <button onClick={function() { setStoreSelectedGroup(isActive ? "all" : g.name); }}
                        style={{ flex: 1, padding: "3px 6px", borderRadius: 4, border: "1px solid " + (isActive ? COLORS.teal : "#ddd"), background: isActive ? COLORS.teal + "15" : "#fff", color: isActive ? COLORS.teal : "#555", fontSize: 9, fontWeight: 600, cursor: "pointer", fontFamily: "Poppins", textAlign: "left" }}>
                        {g.name + " (" + g.stores.length + ")"}
                      </button>
                      <button onClick={function() { openEditGroup(i); }} style={{ padding: "2px 4px", borderRadius: 3, border: "1px solid #ddd", background: "#f9f9f9", fontSize: 8, cursor: "pointer", color: "#888" }}>{"\u270e"}</button>
                      <button onClick={function() { deleteGroup(i); }} style={{ padding: "2px 4px", borderRadius: 3, border: "none", background: COLORS.red + "15", color: COLORS.red, fontSize: 8, cursor: "pointer" }}>{"\u00d7"}</button>
                    </div>
                  );
                })}
                <button onClick={openNewGroup} style={{ width: "100%", padding: "4px 0", borderRadius: 4, border: "1px dashed " + COLORS.teal, background: "transparent", color: COLORS.teal, fontSize: 9, fontWeight: 600, cursor: "pointer", fontFamily: "Poppins", marginTop: 3 }}>
                  {"+ Novo grupo"}
                </button>
              </div>
            </div>

            {/* ── MAIN CONTENT ── */}
            <div style={{ flex: 1, padding: "12px 16px 12px 12px" }}>
              {/* KPI CARDS */}
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 10 }}>
                <div style={cardStyle}>
                  <div style={labelStyle}>{"Faturamento"}</div>

              {/* ROW: Pareto ABC + Donut ABC + Top 5 */}

                    <ResponsiveContainer width="100%" height={290}>
                      <ComposedChart data={paretoData} margin={{ top: 5, right: 40, left: 10, bottom: 70 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
                        <XAxis dataKey="nome" angle={-55} textAnchor="end" tick={{ fontSize: 7 }} interval={0} height={90} />
                        <YAxis yAxisId="left" tickFormatter={function(v) { return fmtBRL(v); }} tick={{ fontSize: 9 }} />

                        <RechartsTooltip formatter={function(value, name) {

                        }} wrapperStyle={{ fontSize: 11 }} contentStyle={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #ddd", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }} itemStyle={{ fontSize: 10, padding: "1px 0" }} labelStyle={{ fontSize: 11, fontWeight: 700, marginBottom: 2 }} />
                        <Bar yAxisId="left" dataKey="valor" name="Faturamento" radius={[3, 3, 0, 0]}>
                          {paretoData.map(function(entry, i) {

                          })}
                        </Bar>
                        <Line yAxisId="right" type="monotone" dataKey="cumPct" name="% Acumulado" stroke={COLORS.navy} strokeWidth={2} dot={false} />
                      </ComposedChart>
                    </ResponsiveContainer>
                    <div style={{ display: "flex", gap: 12, fontSize: 9, color: "#888", marginTop: 4 }}>

                      <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#ccc", marginRight: 3 }} />{"C (95-100%)"}</span>

                  {/* DONUT ABC */}
                  <div style={{ background: "#fff", borderRadius: 10, padding: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", display: "flex", flexDirection: "column", alignItems: "center" }}>
                    <div style={{ fontWeight: 700, fontSize: 12, color: COLORS.navy, marginBottom: 6, alignSelf: "flex-start" }}>{"Distribui\u00e7\u00e3o ABC"}</div>
                    <ResponsiveContainer width="100%" height={170}>
                      <PieChart>
                        <Pie data={donutData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={2}>
                          {donutData.map(function(d, i) { return <Cell key={i} fill={d.fill} />; })}
                        </Pie>
                        <RechartsTooltip formatter={function(value, name) { return fmtBRL(value); }} wrapperStyle={{ fontSize: 11 }} contentStyle={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #ddd", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }} itemStyle={{ fontSize: 10, padding: "1px 0" }} labelStyle={{ fontSize: 11, fontWeight: 700, marginBottom: 2 }} />
                      </PieChart>
                    </ResponsiveContainer>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 10, marginTop: 8 }}>
                      {donutData.map(function(d) {
                        return (
                          <span key={d.name} style={{ color: "#555" }}>
                            <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: d.fill, marginRight: 4 }} />
                            {d.name + ": " + d.count + " lojas (" + (grandTotal > 0 ? (d.value / grandTotal * 100).toFixed(0) : 0) + "%)"}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                  {/* TOP 5 */}
                  <div style={{ background: "#fff", borderRadius: 10, padding: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                    <div style={{ fontWeight: 700, fontSize: 12, color: COLORS.navy, marginBottom: 10 }}>{"Top 5"}</div>
                    {top5.map(function(st, i) {
                      var pct = grandTotal > 0 ? st.totals.valor / grandTotal : 0;
                      var maxPct = grandTotal > 0 ? top5[0].totals.valor / grandTotal : 1;
                      return (
                        <div key={st.nome} style={{ marginBottom: 10 }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 3 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6, minWidth: 0, flex: 1 }}>
                              <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.teal, flexShrink: 0 }}>{i + 1}</span>
                              <span style={{ fontSize: 11, fontWeight: 600, color: COLORS.navy, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{String(st.nome).replace(/^\d+\s*/, "")}</span>
                            </div>
                            <span style={{ fontSize: 11, fontWeight: 700, color: COLORS.navy, whiteSpace: "nowrap", marginLeft: 8 }}>{fmtBRL(st.totals.valor)}</span>
                          </div>
                          <div style={{ height: 5, background: "#f0f0f0", borderRadius: 3 }}>
                            <div style={{ height: 5, background: COLORS.teal, borderRadius: 3, width: (pct / maxPct * 100) + "%", transition: "width 0.3s" }} />
                          </div>
                          <div style={{ fontSize: 9, color: "#999", marginTop: 2 }}>{"Ticket: R$ " + st.totals.ticketMedio.toFixed(2).replace(".", ",") + " \u00b7 " + st.totals.qtdVendas.toLocaleString("pt-BR") + " vendas"}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ) : null}

            </div>
            {/* end of top flex row (sidebar + main) */}
            </div>

            {/* ── FULL-WIDTH ROW: Scatter Plot + Evolution ── */}
            {filteredStores.length > 0 ? (
              <div style={{ display: "grid", gridTemplateColumns: storePeriods.length > 1 ? "1fr 1fr" : "1fr", gap: 12, padding: "12px 16px 14px 0" }}>
                {/* SCATTER: Ticket x Vendas */}
                <div style={{ background: "#fff", borderRadius: 10, padding: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.navy, marginBottom: 8 }}>{"Ticket M\u00e9dio \u00d7 Volume de Vendas"}</div>
                  <ResponsiveContainer width="100%" height={280}>
                    <ScatterChart margin={{ top: 10, right: 20, left: 10, bottom: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
                      <XAxis dataKey="x" name="Vendas" tick={{ fontSize: 10 }} label={{ value: "Qtd Vendas", position: "insideBottom", offset: -5, fontSize: 10, fill: "#999" }} />
                      <YAxis dataKey="y" name="Ticket" tick={{ fontSize: 10 }} tickFormatter={function(v) { return "R$ " + v.toFixed(0); }} label={{ value: "Ticket M\u00e9dio", angle: -90, position: "insideLeft", offset: 10, fontSize: 10, fill: "#999" }} />
                      <ZAxis dataKey="valor" range={[40, 400]} />
                      <RechartsTooltip content={function(props) {
                        if (!props.active || !props.payload || !props.payload[0]) return null;
                        var d = props.payload[0].payload;
                        return (
                          <div style={{ background: "#fff", border: "1px solid #ddd", borderRadius: 6, padding: "8px 12px", fontSize: 11, boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
                            <div style={{ fontWeight: 700, color: COLORS.navy, marginBottom: 3 }}>{d.nome}</div>
                            <div>{"Faturamento: " + fmtBRL(d.valor)}</div>
                            <div>{"Ticket M\u00e9dio: R$ " + d.y.toFixed(2).replace(".", ",")}</div>
                            <div>{"Vendas: " + d.x.toLocaleString("pt-BR")}</div>
                          </div>
                        );
                      }} />
                      <Scatter data={scatterData.filter(function(d) { return d.abc === "A"; })} fill={COLORS.teal} name="Classe A" />
                      <Scatter data={scatterData.filter(function(d) { return d.abc === "B"; })} fill={COLORS.amber} name="Classe B" />
                      <Scatter data={scatterData.filter(function(d) { return d.abc === "C"; })} fill="#ccc" name="Classe C" />
                      <Legend wrapperStyle={{ fontSize: 10 }} />
                    </ScatterChart>
                  </ResponsiveContainer>
                </div>

                {/* MONTHLY EVOLUTION */}
                {storePeriods.length > 1 ? (
                  <div style={{ background: "#fff", borderRadius: 10, padding: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                    <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.navy, marginBottom: 8 }}>{"Evolu\u00e7\u00e3o Mensal \u2014 Top 10"}</div>
                    <ResponsiveContainer width="100%" height={280}>
                      <LineChart margin={{ top: 10, right: 10, left: 10, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
                        <XAxis dataKey="period" type="category" allowDuplicatedCategory={false} tickFormatter={periodLabel} tick={{ fontSize: 10 }} />
                        <YAxis tickFormatter={function(v) { return fmtBRL(v); }} tick={{ fontSize: 9 }} />
                        <RechartsTooltip formatter={function(v) { return fmtBRL(v); }} labelFormatter={periodLabel} wrapperStyle={{ fontSize: 11 }} contentStyle={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #ddd", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }} itemStyle={{ fontSize: 10, padding: "1px 0" }} labelStyle={{ fontSize: 11, fontWeight: 700, marginBottom: 2 }} />
                        <Legend wrapperStyle={{ fontSize: 9 }} />
                        {(function() {
                          var top10 = filteredStores.slice(0, 10);
                          var palette = [COLORS.navy, COLORS.teal, COLORS.orange, COLORS.red, COLORS.amber, "#6366f1", "#ec4899", "#14b8a6", "#8b5cf6", "#f97316"];
                          return top10.map(function(st, idx) {
                            var lineData = storePeriods.map(function(p) {
                              var pd = st.periods[p];
                              return { period: p, valor: pd ? pd.valor : 0 };
                            });
                            return <Line key={st.nome} data={lineData} dataKey="valor" name={st.nome} stroke={palette[idx % palette.length]} strokeWidth={2} dot={{ r: 2 }} />;
                          });
                        })()}
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                ) : null}
              </div>
            ) : null}

            {/* GROUP MODAL */}
            {showStoreGroupModal ? (
              <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.4)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}
                onClick={function() { setShowStoreGroupModal(false); }}>
                <div style={{ background: "#fff", borderRadius: 12, padding: 24, width: 480, maxHeight: "80vh", overflowY: "auto", boxShadow: "0 8px 32px rgba(0,0,0,0.2)" }}
                  onClick={function(e) { e.stopPropagation(); }}>
                  <div style={{ fontWeight: 700, fontSize: 16, color: COLORS.navy, marginBottom: 16 }}>
                    {editGroupIdx >= 0 ? "Editar Grupo" : "Novo Grupo"}
                  </div>
                  <input type="text" placeholder="Nome do grupo..." value={editGroupName}
                    onChange={function(e) { setEditGroupName(e.target.value); }}
                    style={{ width: "100%", padding: "8px 12px", borderRadius: 6, border: "1px solid #ddd", fontSize: 13, fontFamily: "Poppins", marginBottom: 12, boxSizing: "border-box" }}
                  />
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 8 }}>{"Selecione as lojas:"}</div>
                  <div style={{ maxHeight: 300, overflowY: "auto", border: "1px solid #eee", borderRadius: 8, padding: 8 }}>
                    {allStoreData.slice().sort(function(a, b) { return a.nome.localeCompare(b.nome); }).map(function(st) {
                      var checked = editGroupStores.indexOf(st.nome) >= 0;
                      return (
                        <label key={st.nome} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 8px", cursor: "pointer", borderRadius: 4, background: checked ? COLORS.teal + "10" : "transparent" }}>
                          <input type="checkbox" checked={checked} onChange={function() { toggleGroupStore(st.nome); }} />
                          <span style={{ fontSize: 12, fontWeight: checked ? 600 : 400 }}>{String(st.nome)}</span>
                          <span style={{ fontSize: 10, color: "#999", marginLeft: "auto" }}>{fmtBRL(st.totals.valor)}</span>
                        </label>
                      );
                    })}
                  </div>
                  <div style={{ display: "flex", gap: 8, marginTop: 16, justifyContent: "flex-end" }}>
                    <button onClick={function() { setShowStoreGroupModal(false); }}
                      style={{ padding: "8px 16px", borderRadius: 6, border: "1px solid #ddd", background: "#fff", fontSize: 12, cursor: "pointer", fontFamily: "Poppins" }}>
                      {"Cancelar"}
                    </button>
                    <button onClick={saveGroup}
                      style={{ padding: "8px 16px", borderRadius: 6, border: "none", background: COLORS.teal, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "Poppins" }}>
                      {"Salvar"}
                    </button>
                  </div>
                </div>
              </div>
            ) : null}
          </div>
        );
      }

      // ═══════════════════════════════════════════════════════
      // RENDER: ANÁLISE
      // ═══════════════════════════════════════════════════════
      function renderAnalise() {
        if (displayPeriods.length === 0) return <div style={{ padding: 40, textAlign: "center", color: "#999" }}>{"Selecione ao menos um per\u00edodo"}</div>;

        // ─── Helper: find previous period and same-period-last-year ───
        function getPrevPeriod(key) {
          if (grouping === "mensal") {
            var parts = key.split("-"); var y = parseInt(parts[0], 10); var m = parseInt(parts[1], 10);
            m--; if (m < 1) { m = 12; y--; }
            return y + "-" + (m < 10 ? "0" + m : String(m));
          }
          if (grouping === "trimestral") {
            var mt = key.match(/^(\d{4})-Q(\d)$/); if (!mt) return null;
            var yr = parseInt(mt[1], 10); var q = parseInt(mt[2], 10);
            q--; if (q < 1) { q = 4; yr--; }
            return yr + "-Q" + q;
          }
          if (grouping === "semestral") {
            var ms = key.match(/^(\d{4})-S(\d)$/); if (!ms) return null;
            var ys = parseInt(ms[1], 10); var s = parseInt(ms[2], 10);
            s--; if (s < 1) { s = 2; ys--; }
            return ys + "-S" + s;
          }
          return String(parseInt(key, 10) - 1);
        }
        function getYoYPeriod(key) {
          if (grouping === "mensal") {
            var parts = key.split("-"); return String(parseInt(parts[0], 10) - 1) + "-" + parts[1];
          }
          if (grouping === "trimestral") {
            var mt = key.match(/^(\d{4})-Q(\d)$/); return mt ? String(parseInt(mt[1], 10) - 1) + "-Q" + mt[2] : null;
          }
          if (grouping === "semestral") {
            var ms = key.match(/^(\d{4})-S(\d)$/); return ms ? String(parseInt(ms[1], 10) - 1) + "-S" + ms[2] : null;
          }
          return String(parseInt(key, 10) - 1);
        }
        function pLabel(p) {
          if (!p) return "";
          if (grouping === "mensal") return periodLabel(p);
          if (grouping === "trimestral") return quarterLabel(p);
          if (grouping === "semestral") return semesterLabel(p);
          return String(p);
        }

        // Take most recent selected period
        var currentPeriod = displayPeriods[displayPeriods.length - 1];
        var prevPeriod = getPrevPeriod(currentPeriod);
        var yoyPeriod = getYoYPeriod(currentPeriod);
        var dCurrent = dreByPeriod[currentPeriod];
        var dPrev = dreByPeriod[prevPeriod] || null;
        var dYoY = dreByPeriod[yoyPeriod] || null;

        if (!dCurrent) return <div style={{ padding: 40, textAlign: "center", color: "#999" }}>{"Sem dados para o per\u00edodo selecionado"}</div>;

        // ─── Define metrics to analyze ───
        var metrics = [
          { key: "receitaBruta", label: "Receita Bruta", inverted: false, isMargin: false },
          { key: "receitaLiquida", label: "Receita L\u00edquida", inverted: false, isMargin: false },
          { key: "compras", label: "Compras", inverted: true, isMargin: false },
          { key: "cmv", label: "CMV", inverted: true, isMargin: false },
          { key: "cmvPct", label: "CMV %", inverted: true, isMargin: true },
          { key: "perda", label: "Perda (Compra-CMV)", inverted: true, isMargin: false },
          { key: "lucroBruto", label: "Lucro Bruto", inverted: false, isMargin: false },
          { key: "totalOpex", label: "Despesas Operacionais", inverted: true, isMargin: false },
          { key: "ebitda", label: "EBITDA", inverted: false, isMargin: false },
          { key: "juros", label: "Juros e Amortiza\u00e7\u00f5es", inverted: true, isMargin: false },
          { key: "lucroLiquido", label: "Lucro L\u00edquido", inverted: false, isMargin: false },
        ];

        // Add OPEX groups dynamically
        var opexKeys = Object.keys(dCurrent.opexGroups || {}).sort();
        opexKeys.forEach(function(code) {
          var g = dCurrent.opexGroups[code];
          metrics.push({ key: "opex_" + code, label: "OPEX: " + (g ? g.name : "Grupo " + code), inverted: true, isMargin: false, opexCode: code });
        });

        function getVal(d, metric) {
          if (!d) return null;
          if (metric.opexCode) return d.opexGroups[metric.opexCode] ? d.opexGroups[metric.opexCode].total : 0;
          if (metric.key === "cmvPct") return d.receitaBruta > 0 ? d.cmv / d.receitaBruta : 0;
          return d[metric.key] || 0;
        }

        // ─── Build comparison rows ───
        var rows = metrics.map(function(m) {
          var cur = getVal(dCurrent, m);
          var prev = getVal(dPrev, m);
          var yoy = getVal(dYoY, m);

          var deltaPrev = prev !== null ? cur - prev : null;
          var deltaPrevPct = prev !== null && prev !== 0 ? deltaPrev / Math.abs(prev) : null;
          var deltaYoY = yoy !== null ? cur - yoy : null;
          var deltaYoYPct = yoy !== null && yoy !== 0 ? deltaYoY / Math.abs(yoy) : null;

          // "good" means the change is positive for the business
          var prevGood = deltaPrev !== null ? (m.inverted ? deltaPrev <= 0 : deltaPrev >= 0) : null;
          var yoyGood = deltaYoY !== null ? (m.inverted ? deltaYoY <= 0 : deltaYoY >= 0) : null;

          // Impact on lucro (absolute R$ impact)
          var impactPrev = deltaPrev !== null ? (m.inverted ? -deltaPrev : deltaPrev) : 0;

          return {
            metric: m, cur: cur, prev: prev, yoy: yoy,
            deltaPrev: deltaPrev, deltaPrevPct: deltaPrevPct,
            deltaYoY: deltaYoY, deltaYoYPct: deltaYoYPct,
            prevGood: prevGood, yoyGood: yoyGood,
            impactPrev: impactPrev
          };
        });

        // ─── Top impacts (sorted by absolute impact) ───
        var impactRows = rows.filter(function(r) { return r.deltaPrev !== null && r.metric.key !== "receitaBruta" && r.metric.key !== "receitaLiquida" && !r.metric.isMargin; });
        var topPositive = impactRows.filter(function(r) { return r.impactPrev > 0; }).sort(function(a, b) { return b.impactPrev - a.impactPrev; }).slice(0, 5);
        var topNegative = impactRows.filter(function(r) { return r.impactPrev < 0; }).sort(function(a, b) { return a.impactPrev - b.impactPrev; }).slice(0, 5);

        // ─── Auto-recommendations ───
        var recs = [];
        var rb = dCurrent.receitaBruta || 1;
        // Margem CMV
        var curCMVpct = dCurrent.cmv / rb;
        var prevCMVpct = dPrev ? dPrev.cmv / (dPrev.receitaBruta || 1) : null;
        if (prevCMVpct !== null && curCMVpct > prevCMVpct + 0.02) {
          recs.push({ type: "warning", text: "Margem CMV piorou " + ((curCMVpct - prevCMVpct) * 100).toFixed(1) + "pp \u2014 investigar mix de produtos ou negocia\u00e7\u00e3o com fornecedores." });
        } else if (prevCMVpct !== null && curCMVpct < prevCMVpct - 0.02) {
          recs.push({ type: "success", text: "Margem CMV melhorou " + ((prevCMVpct - curCMVpct) * 100).toFixed(1) + "pp \u2014 bom sinal de efici\u00eancia nas compras." });
        }
        // Perda
        var perdaPct = Math.abs(dCurrent.perda || 0) / rb;
        if (perdaPct > 0.05) {
          recs.push({ type: "danger", text: "Perda est\u00e1 em " + (perdaPct * 100).toFixed(1) + "% da RB \u2014 cr\u00edtico. Poss\u00edvel problema de invent\u00e1rio, furto ou quebra." });
        } else if (perdaPct > 0.03) {
          recs.push({ type: "warning", text: "Perda em " + (perdaPct * 100).toFixed(1) + "% da RB \u2014 acima do aceit\u00e1vel. Revisar controle de estoque." });
        }
        // OPEX vs Receita
        var opexPct = (dCurrent.totalOpex || 0) / rb;
        var prevOpexPct = dPrev ? (dPrev.totalOpex || 0) / (dPrev.receitaBruta || 1) : null;
        if (prevOpexPct !== null && opexPct > prevOpexPct + 0.03) {
          recs.push({ type: "warning", text: "OPEX cresceu mais que a receita (" + (opexPct * 100).toFixed(1) + "% vs " + (prevOpexPct * 100).toFixed(1) + "% anterior) \u2014 avaliar se \u00e9 sazonal ou estrutural." });
        }
        // Lucro líquido negativo
        if (dCurrent.lucroLiquido < 0) {
          recs.push({ type: "danger", text: "Lucro l\u00edquido negativo (" + fmtBRL(dCurrent.lucroLiquido) + ") \u2014 opera\u00e7\u00e3o n\u00e3o sustent\u00e1vel no per\u00edodo." });
        }
        // EBITDA decaying
        if (dPrev && dCurrent.ebitda < dPrev.ebitda && dYoY && dCurrent.ebitda < dYoY.ebitda) {
          recs.push({ type: "warning", text: "EBITDA em queda tanto vs per\u00edodo anterior quanto vs ano passado \u2014 tend\u00eancia requer aten\u00e7\u00e3o." });
        }
        // Receita growing
        if (dPrev && dCurrent.receitaBruta > dPrev.receitaBruta && dYoY && dCurrent.receitaBruta > dYoY.receitaBruta) {
          recs.push({ type: "success", text: "Receita bruta crescendo tanto vs per\u00edodo anterior quanto vs ano passado \u2014 momento positivo." });
        }
        // Biggest OPEX group impact
        if (topNegative.length > 0 && topNegative[0].metric.opexCode) {
          recs.push({ type: "info", text: "Maior impacto negativo: " + topNegative[0].metric.label + " (" + fmtBRL(topNegative[0].deltaPrev) + ") \u2014 priorizar revis\u00e3o deste centro de custo." });
        }
        if (recs.length === 0) {
          recs.push({ type: "info", text: "Indicadores est\u00e1veis \u2014 sem alertas cr\u00edticos no per\u00edodo." });
        }

        // ─── RENDER ───
        var sectionStyle = { background: "#fff", borderRadius: 12, padding: "18px 20px", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginBottom: 16 };
        var thStyle = { padding: "8px 10px", fontSize: 10, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: "0.5px", borderBottom: "2px solid #eee", textAlign: "right" };
        var tdStyle = { padding: "7px 10px", fontSize: 12, borderBottom: "1px solid #f5f5f5", textAlign: "right" };

        function renderDelta(delta, deltaPct, good, isMargin) {
          if (delta === null) return <span style={{ color: "#ccc" }}>{"N/D"}</span>;
          var color = good ? COLORS.teal : COLORS.red;
          var arrow = delta > 0 ? <ArrowUp size={10} color={color} /> : delta < 0 ? <ArrowDown size={10} color={color} /> : null;
          return (
            <span style={{ color: color, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 2 }}>
              {arrow}
              {isMargin ? ((delta * 100).toFixed(1) + "pp") : fmtBRL(delta)}
              {deltaPct !== null ? <span style={{ fontSize: 9, opacity: 0.7, marginLeft: 3 }}>{"(" + (deltaPct >= 0 ? "+" : "") + (deltaPct * 100).toFixed(1) + "%)"}</span> : null}
            </span>
          );
        }

        var recColors = { danger: COLORS.red, warning: COLORS.amber, success: COLORS.teal, info: COLORS.navy };
        var recBg = { danger: COLORS.red + "12", warning: COLORS.amber + "15", success: COLORS.teal + "12", info: COLORS.navy + "08" };

        return (
          <div style={{ padding: "16px 20px" }}>
            {/* HEADER */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
              <TrendingUp size={20} color={COLORS.navy} />
              <div>
                <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.navy }}>{"An\u00e1lise de Resultados"}</div>
                <div style={{ fontSize: 12, color: "#888" }}>
                  {"Per\u00edodo atual: " + pLabel(currentPeriod)}
                  {dPrev ? " \u00b7 vs " + pLabel(prevPeriod) : ""}
                  {dYoY ? " \u00b7 vs " + pLabel(yoyPeriod) : ""}
                </div>
              </div>
            </div>

            {/* RECOMMENDATIONS */}
            <div style={sectionStyle}>
              <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.navy, marginBottom: 10 }}>{"Diagn\u00f3stico e Recomenda\u00e7\u00f5es"}</div>
              {recs.map(function(r, i) {
                return (
                  <div key={i} style={{ padding: "8px 12px", borderRadius: 8, background: recBg[r.type], borderLeft: "3px solid " + recColors[r.type], marginBottom: 6, fontSize: 12, color: COLORS.navy, lineHeight: 1.5 }}>
                    {r.text}
                  </div>
                );
              })}
            </div>

            {/* IMPACT RANKING */}
            {dPrev ? (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
                <div style={sectionStyle}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.teal, marginBottom: 10 }}>{"Maiores ganhos vs " + pLabel(prevPeriod)}</div>
                  {topPositive.length === 0 ? <div style={{ fontSize: 12, color: "#aaa" }}>{"Nenhum ganho relevante"}</div> : null}
                  {topPositive.map(function(r, i) {
                    return (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: i < topPositive.length - 1 ? "1px solid #f0f0f0" : "none" }}>
                        <span style={{ fontSize: 12, color: COLORS.navy }}>{r.metric.label}</span>
                        <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.teal }}>{"+" + fmtBRL(r.impactPrev)}</span>
                      </div>
                    );
                  })}
                </div>
                <div style={sectionStyle}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.red, marginBottom: 10 }}>{"Maiores perdas vs " + pLabel(prevPeriod)}</div>
                  {topNegative.length === 0 ? <div style={{ fontSize: 12, color: "#aaa" }}>{"Nenhuma perda relevante"}</div> : null}
                  {topNegative.map(function(r, i) {
                    return (
                      <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: i < topNegative.length - 1 ? "1px solid #f0f0f0" : "none" }}>
                        <span style={{ fontSize: 12, color: COLORS.navy }}>{r.metric.label}</span>
                        <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.red }}>{fmtBRL(r.impactPrev)}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ) : null}

            {/* DETAIL TABLE */}
            <div style={sectionStyle}>
              <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.navy, marginBottom: 10 }}>{"Detalhamento por Indicador"}</div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse" }}>
                  <thead>
                    <tr>
                      <th style={Object.assign({}, thStyle, { textAlign: "left", width: "25%" })}>{"Indicador"}</th>
                      <th style={thStyle}>{pLabel(currentPeriod)}</th>
                      {dPrev ? <th style={thStyle}>{"\u0394 vs " + pLabel(prevPeriod)}</th> : null}
                      {dYoY ? <th style={thStyle}>{"\u0394 vs " + pLabel(yoyPeriod)}</th> : null}
                      {dPrev ? <th style={Object.assign({}, thStyle, { width: 100 })}>{"Status"}</th> : null}
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map(function(r) {
                      var isSummary = ["receitaBruta", "lucroBruto", "ebitda", "lucroLiquido"].indexOf(r.metric.key) >= 0;
                      var rowBg = isSummary ? COLORS.navy + "06" : "transparent";
                      var labelWeight = isSummary ? 700 : 500;
                      return (
                        <tr key={r.metric.key} style={{ background: rowBg }}>
                          <td style={Object.assign({}, tdStyle, { textAlign: "left", fontWeight: labelWeight, color: COLORS.navy, fontSize: isSummary ? 12 : 11 })}>{r.metric.label}</td>
                          <td style={Object.assign({}, tdStyle, { fontWeight: 600 })}>{r.metric.isMargin ? (r.cur * 100).toFixed(1) + "%" : fmtBRL(r.cur)}</td>
                          {dPrev ? <td style={tdStyle}>{renderDelta(r.deltaPrev, r.deltaPrevPct, r.prevGood, r.metric.isMargin)}</td> : null}
                          {dYoY ? <td style={tdStyle}>{renderDelta(r.deltaYoY, r.deltaYoYPct, r.yoyGood, r.metric.isMargin)}</td> : null}
                          {dPrev ? (
                            <td style={Object.assign({}, tdStyle, { textAlign: "center" })}>
                              {r.prevGood === null ? <span style={{ color: "#ccc" }}>{"\u2014"}</span> : r.prevGood ? (
                                <span style={{ background: COLORS.teal + "18", color: COLORS.teal, padding: "2px 8px", borderRadius: 10, fontSize: 9, fontWeight: 700 }}>{"OK"}</span>
                              ) : (
                                <span style={{ background: COLORS.red + "18", color: COLORS.red, padding: "2px 8px", borderRadius: 10, fontSize: 9, fontWeight: 700 }}>{"ATEN\u00c7\u00c3O"}</span>
                              )}
                            </td>
                          ) : null}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      }

      var tabItems = [
        { key: "dashboard", label: "Dashboard", Icon: LayoutDashboard },
        { key: "dre", label: "DRE", Icon: Table2 },
        { key: "analise", label: "An\u00e1lise", Icon: TrendingUp },
        { key: "mix", label: "Mix de Produtos", Icon: ShoppingCart },
        { key: "lojas", label: "Lojas", Icon: Store },
        { key: "orcamento", label: "Or\u00e7amento", Icon: Target },
      ];

      // ─── GITHUB CONFIG MODAL ──────────────────────────────
      function renderGhModal() {
        if (!showGhModal) return null;
        var modalInput = {
          width: "100%", padding: "8px 12px", borderRadius: 6, border: "1px solid #ddd",
          fontSize: 13, fontFamily: "Poppins, sans-serif", outline: "none", boxSizing: "border-box",
        };
        return (
          <div style={{
            position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
            background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 9999
          }} onClick={function(e) { if (e.target === e.currentTarget) setShowGhModal(false); }}>
            <div style={{
              background: "#fff", borderRadius: 12, padding: 32, width: 420, maxWidth: "90vw",
              boxShadow: "0 8px 32px rgba(0,0,0,0.2)"
            }}>
              <h3 style={{ margin: "0 0 8px", fontSize: 16, color: COLORS.navy }}>{"Configurar GitHub Pages"}</h3>
              <p style={{ color: "#888", fontSize: 12, margin: "0 0 20px", lineHeight: 1.5 }}>
                {"Configure uma vez e publique com um clique. O token precisa de permiss\u00e3o 'repo' (ou 'public_repo' para repos p\u00fablicos)."}
              </p>

              <div style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#555", display: "block", marginBottom: 4 }}>{"Usu\u00e1rio GitHub"}</label>
                <input
                  style={modalInput}
                  placeholder="ex: ryazeji"
                  defaultValue={ghConfig.owner}
                  onBlur={function(e) { saveGhConfig(Object.assign({}, ghConfig, { owner: e.target.value.trim() })); }}
                />
              </div>

              <div style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#555", display: "block", marginBottom: 4 }}>{"Reposit\u00f3rio"}</label>
                <input
                  style={modalInput}
                  placeholder="ex: dre-peti-amara"
                  defaultValue={ghConfig.repo}
                  onBlur={function(e) { saveGhConfig(Object.assign({}, ghConfig, { repo: e.target.value.trim() })); }}
                />
              </div>

              <div style={{ marginBottom: 20 }}>
                <label style={{ fontSize: 12, fontWeight: 600, color: "#555", display: "block", marginBottom: 4 }}>{"Personal Access Token"}</label>
                <input
                  style={modalInput}
                  type="password"
                  placeholder="ghp_xxxxxxxxxxxx"
                  defaultValue={ghConfig.token}
                  onBlur={function(e) { saveGhConfig(Object.assign({}, ghConfig, { token: e.target.value.trim() })); }}
                />
                <a href="https://github.com/settings/tokens/new?scopes=repo&description=DRE+Peti" target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: COLORS.teal, textDecoration: "none" }}>
                  {"Criar token no GitHub \u2192"}
                </a>
              </div>

              <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                <button
                  onClick={function() { setShowGhModal(false); }}
                  style={{
                    padding: "8px 20px", borderRadius: 6, border: "1px solid #ddd",
                    background: "#fff", color: "#666", fontSize: 13, cursor: "pointer",
                    fontFamily: "Poppins, sans-serif",
                  }}
                >
                  {"Fechar"}
                </button>
                <button
                  onClick={function() { setShowGhModal(false); publishToGitHub(); }}
                  disabled={!ghConfig.owner || !ghConfig.repo || !ghConfig.token}
                  style={{
                    padding: "8px 20px", borderRadius: 6, border: "none",
                    background: (!ghConfig.owner || !ghConfig.repo || !ghConfig.token) ? "#ccc" : COLORS.teal,
                    color: "#fff", fontSize: 13, cursor: (!ghConfig.owner || !ghConfig.repo || !ghConfig.token) ? "not-allowed" : "pointer",
                    fontFamily: "Poppins, sans-serif", fontWeight: 600,
                  }}
                >
                  {"Salvar e Publicar"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ fontFamily: "Poppins, sans-serif", background: COLORS.bg, minHeight: "100vh" }}>
          {renderGhModal()}
          <div style={{ height: 4, background: "linear-gradient(90deg, " + COLORS.cream + ", " + COLORS.amber + ", " + COLORS.orange + ", " + COLORS.red + ")" }} />

          <div style={{ background: COLORS.navy, padding: "12px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <h1 style={{ color: "#fff", fontSize: 20, fontWeight: 700, margin: 0 }}>{"DRE Petí"}</h1>
              {snapshotMode && window.__DRE_SNAPSHOT__ && (
                <span style={{
                  background: "rgba(255,255,255,0.15)", color: "#fff", fontSize: 10, padding: "3px 10px",
                  borderRadius: 12, fontWeight: 500, letterSpacing: 0.5
                }}>
                  {"Snapshot — " + new Date(window.__DRE_SNAPSHOT__.exportedAt).toLocaleDateString("pt-BR")}
                </span>
              )}
              <span style={{ color: "rgba(255,255,255,0.5)", fontSize: 12 }}>
                {selectedBranches.length === branches.length
                  ? "Consolidado (" + branches.length + " filiais)"
                  : selectedBranches.length === 1
                    ? String(selectedBranches[0])
                    : selectedBranches.length + " filiais selecionadas"}
              </span>
            </div>
            {!snapshotMode && (
              <button
                onClick={function() { setProcessed(false); }}
                style={{
                  padding: "6px 16px", borderRadius: 6, border: "1px solid rgba(255,255,255,0.3)",
                  background: "transparent", color: "#fff", fontSize: 12, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 6, fontFamily: "Poppins, sans-serif",
                }}
              >
                <Upload size={14} /> {"Novo upload"}
              </button>
            )}
            {!snapshotMode && (
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <button
                  onClick={publishToGitHub}
                  disabled={publishing}
                  style={{
                    padding: "6px 16px", borderRadius: 6, border: "none",
                    background: publishing ? "rgba(255,255,255,0.1)" : COLORS.teal, color: "#fff", fontSize: 12,
                    cursor: publishing ? "not-allowed" : "pointer",
                    display: "flex", alignItems: "center", gap: 6, fontFamily: "Poppins, sans-serif", fontWeight: 600,
                  }}
                >
                  <Globe size={14} /> {publishing ? "Publicando..." : "Publicar"}
                </button>
                <button
                  onClick={function() { setShowGhModal(true); }}
                  style={{
                    padding: "6px 8px", borderRadius: 6, border: "1px solid rgba(255,255,255,0.2)",
                    background: "transparent", color: "rgba(255,255,255,0.6)", cursor: "pointer",
                    display: "flex", alignItems: "center",
                  }}
                  title="Configurar GitHub"
                >
                  <Settings size={14} />
                </button>
                {publishStatus && !publishing && (
                  publishStatus.startsWith("https://") ? (
                    <a href={publishStatus} target="_blank" rel="noopener noreferrer" style={{
                      color: COLORS.teal, fontSize: 11, display: "flex", alignItems: "center", gap: 4, textDecoration: "none"
                    }}>
                      <ExternalLink size={12} /> {"Online"}
                    </a>
                  ) : (
                    <span style={{ color: publishStatus.startsWith("Erro") ? COLORS.red : "#fff", fontSize: 11 }}>
                      {String(publishStatus)}
                    </span>
                  )
                )}
                <button
                  onClick={exportSnapshot}
                  style={{
                    padding: "6px 12px", borderRadius: 6, border: "1px solid rgba(255,255,255,0.2)",
                    background: "transparent", color: "rgba(255,255,255,0.6)", fontSize: 11, cursor: "pointer",
                    display: "flex", alignItems: "center", gap: 4, fontFamily: "Poppins, sans-serif",
                  }}
                  title="Baixar snapshot como arquivo"
                >
                  <Download size={12} /> {"Baixar HTML"}
                </button>
              </div>
            )}
          </div>

          <div style={{
            background: "#fff", borderBottom: "1px solid #e5e5e5",
            padding: "8px 24px", display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center"
          }}>
            <div style={{ display: "flex", gap: 0, marginRight: 16 }}>
              {tabItems.map(function(tab) {
                return (
                  <button
                    key={tab.key}
                    onClick={function() { setActiveTab(tab.key); }}
                    style={{
                      padding: "8px 16px", border: "none", cursor: "pointer",
                      background: activeTab === tab.key ? COLORS.orange : "transparent",
                      color: activeTab === tab.key ? "#fff" : "#666",
                      fontWeight: 600, fontSize: 13, borderRadius: 6,
                      display: "flex", alignItems: "center", gap: 6,
                      fontFamily: "Poppins, sans-serif",
                    }}
                  >
                    <tab.Icon size={14} /> {String(tab.label)}
                  </button>
                );
              })}
            </div>

            <div style={{ width: 1, height: 28, background: "#e0e0e0" }} />

            <div style={{ display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap" }}>
              <span style={{ fontSize: 11, color: "#999", marginRight: 4 }}>{"Filiais:"}</span>
              <button
                onClick={function() {
                  if (selectedBranches.length === branches.length) {
                    setSelectedBranches(branches.length > 0 ? [branches[0]] : []);
                  } else {
                    setSelectedBranches(branches.slice());
                  }
                }}
                style={{
                  padding: "3px 10px", borderRadius: 4, fontSize: 11, cursor: "pointer",
                  border: "1px solid " + (selectedBranches.length === branches.length ? COLORS.teal : "#ddd"),
                  background: selectedBranches.length === branches.length ? COLORS.teal + "15" : "#fff",
                  color: selectedBranches.length === branches.length ? COLORS.teal : "#666",
                  fontWeight: selectedBranches.length === branches.length ? 600 : 400,
                  fontFamily: "Poppins, sans-serif"
                }}
              >
                {"Todas"}
              </button>
              {branches.map(function(b) {
                var sel = selectedBranches.indexOf(b) >= 0;
                return (
                  <button
                    key={b}
                    onClick={function() {
                      if (sel) {
                        var next = selectedBranches.filter(function(x) { return x !== b; });
                        if (next.length > 0) setSelectedBranches(next);
                      } else {
                        setSelectedBranches(selectedBranches.concat([b]).sort());
                      }
                    }}
                    style={{
                      padding: "3px 10px", borderRadius: 4, fontSize: 11, cursor: "pointer",
                      border: "1px solid " + (sel ? COLORS.orange : "#ddd"),
                      background: sel ? COLORS.orange + "15" : "#fff",
                      color: sel ? COLORS.orange : "#666",
                      fontWeight: sel ? 600 : 400,
                      fontFamily: "Poppins, sans-serif"
                    }}
                  >
                    {String(b)}
                  </button>
                );
              })}
            </div>

            <div style={{ width: 1, height: 28, background: "#e0e0e0" }} />

            <SegmentedButton
              options={[{ value: "mensal", label: "Mensal" }, { value: "trimestral", label: "Trimestral" }, { value: "semestral", label: "Semestral" }, { value: "anual", label: "Anual" }]}
              selected={grouping}
              onChange={setGrouping}
            />

            <div style={{ width: 1, height: 28, background: "#e0e0e0" }} />

            <div style={{ display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap" }}>
              <span style={{ fontSize: 11, color: "#999", marginRight: 4 }}>{"Períodos:"}</span>
              {availablePeriodOptions.map(function(p) {
                var sel = isPeriodSelected(p);
                return (
                  <button
                    key={p}
                    onClick={function() { togglePeriod(p); }}
                    style={{
                      padding: "3px 10px", borderRadius: 4, fontSize: 11, cursor: "pointer",
                      border: "1px solid " + (sel ? COLORS.orange : "#ddd"),
                      background: sel ? COLORS.orange + "15" : "#fff",
                      color: sel ? COLORS.orange : "#666",
                      fontWeight: sel ? 600 : 400,
                      fontFamily: "Poppins, sans-serif",
                    }}
                  >
                    {grouping === "mensal" ? periodLabel(p) : grouping === "trimestral" ? quarterLabel(p) : grouping === "semestral" ? semesterLabel(p) : String(p)}
                  </button>
                );
              })}
              <button onClick={function() { setSelectedPeriods(periods.slice()); }} style={Object.assign({}, tinyBtnStyle, { color: COLORS.teal })}>{"Todos"}</button>
              <button onClick={function() { setSelectedPeriods([]); }} style={Object.assign({}, tinyBtnStyle, { color: COLORS.red })}>{"Nenhum"}</button>
            </div>

            <div style={{ flex: 1 }} />

            {!snapshotMode && (
              <button
                onClick={function() { setProcessed(false); }}
                style={{
                  padding: "5px 12px", borderRadius: 6, border: "1px solid " + COLORS.orange,
                  background: "#fff", color: COLORS.orange, fontSize: 11, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 4, fontWeight: 600,
                  fontFamily: "Poppins, sans-serif",
                }}
              >
                <Plus size={12} /> {"Adicionar arquivos"}
              </button>
            )}
          </div>

          <div style={{ margin: "0 auto" }}>
            {activeTab === "dashboard" ? renderDashboard() : null}
            {activeTab === "dre" ? renderDRETable() : null}
            {activeTab === "analise" ? renderAnalise() : null}
            {activeTab === "mix" ? renderMix() : null}
            {activeTab === "lojas" ? renderLojas() : null}
            {activeTab === "orcamento" ? renderOrcamento() : null}
          </div>
        </div>
      );
    }

    // ─── MOUNT ───────────────────────────────────────────────
    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(DREPeti));
  </script>
</body>
</html>
